name: Daily Market Intelligence Scraper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_ID: d2c-analytics-502304
      LOCATION: asia-northeast3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure output directories
        run: |
          mkdir -p docs/data
          mkdir -p docs/landings
          touch docs/landings/.gitkeep

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Meta Ads Library
        run: python scripts/scrape_ads_library.py
        continue-on-error: true

      - name: Refresh Mart 22
        run: |
          bq query \
            --project_id="${PROJECT_ID}" \
            --location="${LOCATION}" \
            --use_legacy_sql=false \
            --format=none \
            < sql/22_mart_market_winners.sql

      - name: Refresh Mart 23
        run: |
          bq query \
            --project_id="${PROJECT_ID}" \
            --location="${LOCATION}" \
            --use_legacy_sql=false \
            --format=none \
            < sql/23_mart_appeal_gap.sql
        continue-on-error: true

      - name: Export JSON
        run: |
          echo "=== market_winners ==="
          bq query \
            --project_id="${PROJECT_ID}" \
            --location="${LOCATION}" \
            --use_legacy_sql=false \
            --format=json \
            --max_rows=10000 \
            "SELECT * FROM \`${PROJECT_ID}.marts.mart_market_winners\` WHERE running_days IS NOT NULL ORDER BY running_days DESC LIMIT 3000" \
            > docs/data/market_winners.json

          echo "=== appeal_gap ==="
          bq query \
            --project_id="${PROJECT_ID}" \
            --location="${LOCATION}" \
            --use_legacy_sql=false \
            --format=json \
            --max_rows=100 \
            "SELECT * FROM \`${PROJECT_ID}.marts.mart_appeal_gap\` ORDER BY gap_pct DESC" \
            > docs/data/appeal_gap.json

          ls -lh docs/data/market_winners.json docs/data/appeal_gap.json

      - name: Commit files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync scraped ads library [skip ci]"
          file_pattern: |
            docs/data/*.json
            docs/landings/*
