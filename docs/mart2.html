<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 2 · 퍼널 이탈 분석 | D2C Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="mart_common.css">
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta">매일 KST 19:00 자동 갱신</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard / Marketing Analytics</div>
      <h1>Mart 2 · 퍼널 이탈 분석</h1>
      <div class="desc">사용자가 상품페이지→장바구니→결제→구매까지 어디에서 이탈하는지 단계별로 추적합니다.</div>
      <div class="meta-row"><span id="status">데이터 불러오는 중...</span></div>
    </div>

    <div class="controls">
      <div><label>퍼널 유형</label><select id="selFunnel"></select></div>
      <div><label>세그먼트</label><select id="selSegment"></select></div>
      <div><label>날짜</label><select id="selDate"></select></div>
    </div>

    <div id="heroArea"></div>
    <div id="insightArea"></div>

    <div class="chart-box wide">
      <h3>🔻 선택 조건의 퍼널</h3>
      <div class="h3-sub">각 단계별 세션 수와 이탈률</div>
      <div class="funnel-wrap" id="funnelWrap"></div>
    </div>

    <div class="chart-grid">
      <div class="chart-box"><h3>Step Sessions Trend</h3><div class="h3-sub">스텝별 세션 수 추이</div><canvas id="stepTrendChart"></canvas></div>
      <div class="chart-box"><h3>Drop-off Rate Trend</h3><div class="h3-sub">스텝간 이탈률 추이 (%)</div><canvas id="dropoffChart"></canvas></div>
    </div>

    <div class="chart-box wide">
      <h3>Raw Data</h3><div class="h3-sub">원본 데이터 (선택 조건)</div>
      <div style="overflow-x:auto"><table id="dataTable"></table></div>
    </div>
  </main>
</div>

<script src="mart_common.js" data-skip-auto></script>
<script>
// Mart 2 전용 로직 (공통 스크립트의 자동 render는 무시하고 커스텀 사용)
const STEP_KO = {
  view_item: '상품 조회', add_to_cart: '장바구니 담기', begin_checkout: '결제 시작',
  add_payment_info: '결제정보 입력', add_shipping_info: '배송정보 입력', purchase: '구매 완료'
};
const stepKo = k => STEP_KO[k] || k;

let ALL = [];
let charts = {};

async function loadData() {
  const s = document.getElementById('status');
  try {
    const res = await fetch('data/mart2_funnel.json?t=' + Date.now());
    if (!res.ok) throw new Error('데이터 파일을 찾을 수 없음');
    ALL = await res.json();
    if (!ALL.length) { s.textContent = '데이터 없음'; return; }
    s.textContent = `총 ${ALL.length.toLocaleString()}행 · 최신: ${ALL[ALL.length-1].event_date}`;
    initControls();
    render();
  } catch(e) { s.textContent = '⚠️ ' + e.message; }
}
function uniqSorted(a) { return [...new Set(a)].sort(); }
function shortDate(s) { const p = String(s).split('-'); return p.length===3 ? `${p[1]}/${p[2]}` : s; }
function fmt(v) { return isFinite(v) ? v.toLocaleString(undefined, {maximumFractionDigits: 1}) : '-'; }
function deltaBadge(cur, prev) {
  if (!isFinite(cur) || !isFinite(prev) || prev === 0) return '<span class="delta-badge flat">— 비교불가</span>';
  const d = ((cur - prev)/Math.abs(prev))*100;
  const arrow = d > 0.5 ? '↑' : (d < -0.5 ? '↓' : '→');
  const cls = d > 0.5 ? 'up' : (d < -0.5 ? 'down' : 'flat');
  return `<span class="delta-badge ${cls}">${arrow} ${d >= 0 ? '+' : ''}${d.toFixed(1)}%</span>`;
}

function initControls() {
  const selF = document.getElementById('selFunnel');
  const selS = document.getElementById('selSegment');
  const selD = document.getElementById('selDate');
  uniqSorted(ALL.map(r=>r.funnel_type)).forEach(v => {
    const o = document.createElement('option'); o.value=v; o.textContent=v; selF.appendChild(o);
  });
  function refSeg() {
    selS.innerHTML='';
    uniqSorted(ALL.filter(r=>r.funnel_type===selF.value).map(r=>r.segment)).forEach(v => {
      const o = document.createElement('option'); o.value=v; o.textContent=v; selS.appendChild(o);
    });
  }
  function refDate() {
    selD.innerHTML='';
    const ds = uniqSorted(ALL.filter(r=>r.funnel_type===selF.value && r.segment===selS.value).map(r=>r.event_date));
    ds.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; selD.appendChild(o); });
    selD.value = ds[ds.length-1];
  }
  refSeg(); refDate();
  selF.addEventListener('change', () => { refSeg(); refDate(); render(); });
  selS.addEventListener('change', () => { refDate(); render(); });
  selD.addEventListener('change', render);
}

function render() {
  const ft = document.getElementById('selFunnel').value;
  const sg = document.getElementById('selSegment').value;
  const dt = document.getElementById('selDate').value;
  const filtered = ALL.filter(r => r.funnel_type===ft && r.segment===sg);
  const latestDay = filtered.filter(r=>r.event_date===dt).sort((a,b)=>a.step_number-b.step_number);
  const dates = uniqSorted(filtered.map(r=>r.event_date));
  const prevDt = dates[dates.indexOf(dt)-1];
  const prevDay = prevDt ? filtered.filter(r=>r.event_date===prevDt).sort((a,b)=>a.step_number-b.step_number) : [];

  // 배너
  const heroArea = document.getElementById('heroArea');
  heroArea.innerHTML = '';
  if (latestDay.length) {
    const first = latestDay[0], last = latestDay[latestDay.length-1];
    const firstPrev = prevDay[0], lastPrev = prevDay[prevDay.length-1];
    const totalCvr = first.sessions > 0 ? (last.sessions/first.sessions*100) : 0;
    const totalCvrPrev = (firstPrev && firstPrev.sessions > 0) ? (lastPrev.sessions/firstPrev.sessions*100) : NaN;
    const hero = document.createElement('div');
    hero.className = 'hero-grid';
    hero.innerHTML = `
      <div class="hero-card">
        <div class="h-label">${first.step_name}<span class="ko">· ${stepKo(first.step_name)} (유입)</span></div>
        <div class="h-value">${fmt(first.sessions)}</div>
        <div class="h-delta">전일 ${firstPrev ? deltaBadge(first.sessions, firstPrev.sessions) : '<span class="delta-badge flat">비교불가</span>'}</div>
      </div>
      <div class="hero-card">
        <div class="h-label">${last.step_name}<span class="ko">· ${stepKo(last.step_name)} (최종)</span></div>
        <div class="h-value">${fmt(last.sessions)}</div>
        <div class="h-delta">전일 ${lastPrev ? deltaBadge(last.sessions, lastPrev.sessions) : '<span class="delta-badge flat">비교불가</span>'}</div>
      </div>
      <div class="hero-card">
        <div class="h-label">Total CVR<span class="ko">· 총 전환율 (${stepKo(first.step_name)}→${stepKo(last.step_name)})</span></div>
        <div class="h-value">${totalCvr.toFixed(2)}%</div>
        <div class="h-delta">전일 ${isFinite(totalCvrPrev) ? deltaBadge(totalCvr, totalCvrPrev) : '<span class="delta-badge flat">비교불가</span>'}</div>
      </div>`;
    heroArea.appendChild(hero);
  }

  // 인사이트
  const insArea = document.getElementById('insightArea');
  insArea.innerHTML = '';
  if (latestDay.length > 1) {
    const items = [];
    let worst = null;
    latestDay.forEach(r => {
      const dp = parseFloat(r.dropoff_from_prev_pct);
      if (isFinite(dp) && (!worst || dp > parseFloat(worst.dropoff_from_prev_pct))) worst = r;
    });
    if (worst) {
      const dp = parseFloat(worst.dropoff_from_prev_pct);
      const cls = dp >= 80 ? 'bad' : (dp >= 60 ? 'warn' : 'good');
      const emo = dp >= 80 ? '🚨' : (dp >= 60 ? '⚠️' : '✅');
      items.push({cls, text: `${emo} 가장 큰 이탈: <b>${stepKo(worst.step_name)}</b> 단계에서 <b>${dp.toFixed(1)}%</b> 이탈 → 이 단계의 UX 개선이 가장 임팩트가 큼`});
    }
    if (prevDay.length) {
      latestDay.forEach(r => {
        const p = prevDay.find(x => x.step_number === r.step_number);
        if (!p) return;
        const cur = parseFloat(r.dropoff_from_prev_pct);
        const prv = parseFloat(p.dropoff_from_prev_pct);
        if (!isFinite(cur) || !isFinite(prv)) return;
        const diff = cur - prv;
        if (Math.abs(diff) < 5) return;
        const good = diff < 0;
        const emo = good ? '✅' : '⚠️';
        const cls = good ? 'good' : 'bad';
        items.push({cls, text: `${emo} <b>${stepKo(r.step_name)}</b> 이탈률이 전일 대비 ${Math.abs(diff).toFixed(1)}p ${good ? '개선' : '악화'} (${prv.toFixed(1)}% → ${cur.toFixed(1)}%)`});
      });
    }
    if (items.length) {
      const box = document.createElement('div');
      box.className = 'insight-box';
      box.innerHTML = `<div class="i-title">💡 오늘의 하이라이트 · ${dt}</div>` +
        items.map(i => `<div class="insight-item ${i.cls}">${i.text}</div>`).join('');
      insArea.appendChild(box);
    }
  }

  // 퍼널 바
  const fw = document.getElementById('funnelWrap');
  fw.innerHTML = '';
  if (!latestDay.length) {
    fw.innerHTML = '<div class="status">데이터 없음</div>';
  } else {
    const topVal = parseFloat(latestDay[0].sessions) || 0;
    latestDay.forEach((r, i) => {
      const val = parseFloat(r.sessions) || 0;
      const width = topVal > 0 ? val/topVal*100 : 0;
      const drop = r.dropoff_from_prev_pct;
      const row = document.createElement('div');
      row.className = 'funnel-row';
      row.innerHTML = `
        <div class="funnel-label">${r.step_number}. ${r.step_name}<span class="ko">${stepKo(r.step_name)}</span></div>
        <div class="funnel-bar-outer"><div class="funnel-bar-inner" style="width:${Math.max(width,3)}%">${val.toLocaleString()} · ${r.pct_of_step1 ?? 0}%</div></div>
        <div class="funnel-drop">${(drop!=null && i>0) ? `↓ ${drop}% 이탈` : '-'}</div>`;
      fw.appendChild(row);
    });
  }

  // 차트
  const stepsAll = uniqSorted(filtered.map(r => `${r.step_number}|${r.step_name}`));
  const labels = dates.map(shortDate);
  const palette = ['#0066FF','#4d94ff','#F59E0B','#00A76F','#E5484D','#8B5CF6','#06B6D4'];
  const stepDs = stepsAll.map((s, i) => {
    const [num, name] = s.split('|');
    return {
      label: `${num}. ${stepKo(name)}`,
      data: dates.map(d => {
        const rr = filtered.find(r => r.event_date===d && r.step_number==num && r.step_name===name);
        return rr ? parseFloat(rr.sessions) : 0;
      }),
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '1A',
      tension: 0.35, pointRadius: 2, borderWidth: 2, fill: false
    };
  });
  if (charts.step) charts.step.destroy();
  charts.step = new Chart(document.getElementById('stepTrendChart').getContext('2d'), {
    type: 'line', data: {labels, datasets: stepDs},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: {legend:{labels:{color:'#5A6478', font:{size:11}}}},
      scales: {x:{ticks:{color:'#8892A6', font:{size:11}, maxRotation:60, minRotation:45, autoSkip:true},grid:{color:'#F0F3F7'}},
               y:{ticks:{color:'#8892A6', font:{size:11}},grid:{color:'#F0F3F7'}, beginAtZero:true}} }
  });

  const dropDs = stepsAll.map((s, i) => {
    const [num, name] = s.split('|');
    if (num == 1) return null;
    return {
      label: `${num}. ${stepKo(name)}`,
      data: dates.map(d => {
        const rr = filtered.find(r => r.event_date===d && r.step_number==num && r.step_name===name);
        return rr ? parseFloat(rr.dropoff_from_prev_pct) : null;
      }),
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '1A',
      tension: 0.35, pointRadius: 2, borderWidth: 2, fill: false
    };
  }).filter(Boolean);
  if (charts.drop) charts.drop.destroy();
  charts.drop = new Chart(document.getElementById('dropoffChart').getContext('2d'), {
    type: 'line', data: {labels, datasets: dropDs},
    options: { responsive: true, maintainAspectRatio: false,
      plugins: {legend:{labels:{color:'#5A6478', font:{size:11}}}},
      scales: {x:{ticks:{color:'#8892A6', font:{size:11}, maxRotation:60, minRotation:45, autoSkip:true},grid:{color:'#F0F3F7'}},
               y:{ticks:{color:'#8892A6', font:{size:11}},grid:{color:'#F0F3F7'}, beginAtZero:true}} }
  });

  const table = document.getElementById('dataTable');
  const keys = ['event_date','funnel_type','segment','step_number','step_name','sessions','pct_of_step1','dropoff_from_prev_pct'];
  const koMap = {event_date:'날짜', funnel_type:'퍼널 유형', segment:'세그먼트', step_number:'단계', step_name:'단계명', sessions:'세션', pct_of_step1:'1단계 대비 %', dropoff_from_prev_pct:'이탈률 %'};
  const thead = '<thead><tr>' + keys.map(k=>`<th>${k}<br><span style="font-weight:400;text-transform:none;color:#8892A6">${koMap[k]||k}</span></th>`).join('') + '</tr></thead>';
  const tbody = '<tbody>' + filtered.slice().reverse().map(r =>
    '<tr>' + keys.map(k=>`<td>${r[k] ?? ''}</td>`).join('') + '</tr>').join('') + '</tbody>';
  table.innerHTML = thead + tbody;
}

// 사이드바 빌드
(function(){
  const marts = [
    ['mart1.html','1','일별 이커머스 KPI'],['mart2.html','2','퍼널 이탈 분석'],
    ['mart3.html','3','코호트 리텐션'],['mart4.html','4','멀티터치 어트리뷰션'],
    ['mart5.html','5','LTV / RFM'],['mart6.html','6','신규 vs 재방문'],
    ['mart7.html','7','요일×시간대 히트맵'],['mart8.html','8','콘텐츠 참여도'],
    ['mart9.html','9','다크소셜 / AI 리퍼럴']
  ];
  const sb = document.querySelector('.sidebar');
  const cur = location.pathname.split('/').pop();
  sb.innerHTML = `<div class="sec-label">Analytics</div>` +
    marts.map(([h,n,name]) => `<a href="${h}" class="${h===cur?'active':''}"><span class="num">${n}</span> ${name}</a>`).join('');
})();
loadData();
</script>
</body>
</html>
