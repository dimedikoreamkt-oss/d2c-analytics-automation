<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 14 · 관심사 카테고리 | D2C Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="mart_common.css">
<style>
  .type-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .type-tabs button {
    background: white; color: var(--text-secondary); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    min-width: 180px; transition: all .15s;
  }
  .type-tabs button:hover { border-color: var(--primary); color: var(--primary); }
  .type-tabs button.active { background: var(--primary); border-color: var(--primary); color: white; }
  .type-tabs button .en { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; font-weight: 400; }
  .type-tabs button.active .en { color: rgba(255,255,255,0.85); }

  .interest-rank { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .interest-rank { grid-template-columns: 1fr; } }
  .rank-panel { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; box-shadow: var(--shadow-sm); }
  .rank-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .rank-panel .h3-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .rank-list { display: flex; flex-direction: column; gap: 8px; }
  .rank-row { display: flex; align-items: center; gap: 12px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  .rank-row:last-child { border-bottom: none; }
  .rank-row .num { width: 26px; font-weight: 700; color: var(--text-muted); font-size: 13px; }
  .rank-row .lbl { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-row .bar-outer { flex: 2; height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; }
  .rank-row .bar-inner { height: 100%; background: linear-gradient(90deg, var(--primary), #4d94ff); border-radius: 6px; display: flex; align-items: center; padding: 0 8px; color: white; font-size: 11px; font-weight: 700; }
  .rank-row .val { width: 90px; text-align: right; font-weight: 700; color: var(--primary); font-size: 13px; }
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta">매일 KST 19:00 자동 갱신</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard / Growth Analytics</div>
      <h1>Mart 14 · 관심사 카테고리 분석</h1>
      <div class="desc">GA4가 자동 분류한 사용자 관심사(affinity), 구매 의향(in-market), 생애 이벤트(life event)별 유입·전환·매출 랭킹. 우리 브랜드에 가장 반응이 큰 관심사 클러스터를 찾아 신규 타겟 확장에 활용하세요.</div>
      <div class="meta-row"><span id="status">데이터 불러오는 중...</span></div>
    </div>
    <div id="root"></div>
  </main>
</div>
<script src="mart_common.js"></script>
<script>
window.addEventListener('load', () => setTimeout(() => {
  const root = document.getElementById('root');
  if (root) root.innerHTML = '';
  customRender();
}, 200));

const TYPE_INFO = {
  affinity: { ko: '관심 친밀도', desc: '평소 관심이 많은 주제 (예: Fashion Enthusiasts)' },
  in_market: { ko: '구매 의향군', desc: '최근 구매 검토 중인 카테고리 (예: Fitness Products Buyers)' },
  life_event: { ko: '생애 이벤트', desc: '삶의 전환점 (예: Recently Moved, Getting Married)' }
};

async function customRender() {
  const statusEl = document.getElementById('status');
  const root = document.getElementById('root');
  try {
    const res = await fetch('data/mart14_interest.json?t=' + Date.now());
    if (!res.ok) throw new Error('데이터 파일을 찾을 수 없음');
    const rows = await res.json();
    if (!rows || !rows.length) { statusEl.textContent = '아직 데이터가 없습니다.'; return; }
    statusEl.textContent = '총 ' + rows.length.toLocaleString() + '행 로드됨';

    const allDates = [...new Set(rows.map(r => r.event_date))].sort();
    let range = buildDateFilter(root, allDates, v => { range = v; draw(); });

    // 관심사 유형 탭
    const types = [...new Set(rows.map(r => r.interest_type))].filter(t => TYPE_INFO[t]);
    let currentType = types[0] || 'affinity';
    const tabWrap = document.createElement('div');
    tabWrap.className = 'type-tabs';
    tabWrap.innerHTML = types.map(t => {
      const info = TYPE_INFO[t];
      return '<button class="' + (t === currentType ? 'active' : '') + '" data-type="' + t + '">' +
        '<span>' + info.ko + ' <span class="en">' + t + '</span></span>' +
        '<span style="font-size:11px;opacity:0.85;font-weight:400">' + info.desc + '</span>' +
      '</button>';
    }).join('');
    root.appendChild(tabWrap);
    tabWrap.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        currentType = b.dataset.type;
        tabWrap.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        draw();
      });
    });

    // 지표 선택
    const metrics = ['users', 'sessions', 'purchases', 'revenue', 'cvr_user_pct', 'aov'];
    let sortBy = 'users';
    const metricBar = document.createElement('div');
    metricBar.className = 'chip-bar';
    metricBar.innerHTML = '<div class="chip-label">' + ICONS.bar + ' 정렬 기준</div>' +
      metrics.map(k => '<span class="chip ' + (k === sortBy ? 'active' : '') + '" data-key="' + k + '">' +
        ko(k) + ' <span class="chip-en">' + k + '</span></span>').join('');
    root.appendChild(metricBar);
    metricBar.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => {
        sortBy = el.dataset.key;
        metricBar.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        draw();
      });
    });

    const content = document.createElement('div');
    root.appendChild(content);

    function draw() {
      content.innerHTML = '';
      const filtered = filterByRange(rows, 'event_date', range.primaryStart, range.primaryEnd)
        .filter(r => r.interest_type === currentType);
      if (!filtered.length) { content.innerHTML = '<p class="status">데이터가 없습니다. GA4 Google 신호 활성화가 필요할 수 있습니다.</p>'; return; }

      // 카테고리별 집계
      const agg = {};
      filtered.forEach(r => {
        const v = r.interest_value || 'unknown';
        if (!agg[v]) agg[v] = { users: 0, sessions: 0, purchases: 0, revenue: 0, cvr: [], aov: [] };
        agg[v].users += parseFloat(r.users) || 0;
        agg[v].sessions += parseFloat(r.sessions) || 0;
        agg[v].purchases += parseFloat(r.purchases) || 0;
        agg[v].revenue += parseFloat(r.revenue) || 0;
        if (isFinite(parseFloat(r.cvr_user_pct))) agg[v].cvr.push(parseFloat(r.cvr_user_pct));
        if (isFinite(parseFloat(r.aov))) agg[v].aov.push(parseFloat(r.aov));
      });
      const list = Object.entries(agg).map(([name, a]) => ({
        name,
        users: a.users, sessions: a.sessions, purchases: a.purchases, revenue: a.revenue,
        cvr_user_pct: a.cvr.length ? a.cvr.reduce((x,y)=>x+y,0)/a.cvr.length : 0,
        aov: a.aov.length ? a.aov.reduce((x,y)=>x+y,0)/a.aov.length : 0
      })).filter(x => x.name !== 'unknown' || Object.keys(agg).length === 1);
      list.sort((a,b) => b[sortBy] - a[sortBy]);

      const top20 = list.slice(0, 20);

      // 인사이트
      if (top20.length) {
        const top = top20[0];
        const totalUsers = list.reduce((s,r) => s+r.users, 0);
        const topShare = totalUsers > 0 ? (top.users/totalUsers*100).toFixed(1) : 0;
        const insBox = document.createElement('div');
        insBox.className = 'insight-box';
        insBox.innerHTML = '<div class="i-title">' + ICONS.insight + ' ' + TYPE_INFO[currentType].ko + ' 요약</div>' +
          '<div class="insight-item good"><span class="i-ico">' + ICONS.check + '</span><span class="i-txt">1위 카테고리는 <b>' + top.name + '</b>로 전체 사용자의 <b>' + topShare + '%</b>를 차지합니다 (사용자 ' + fmt(top.users) + '명, 매출 ' + fmt(top.revenue) + ')</span></div>' +
          '<div class="insight-item good"><span class="i-ico">' + ICONS.check + '</span><span class="i-txt">총 <b>' + list.length + '개</b> 관심사 카테고리에서 유입이 감지되었어요 — 상위 20개에 광고비를 집중하는 것이 효율적입니다</span></div>';
        content.appendChild(insBox);
      }

      // Top 20 랭킹 바
      const rankPanel = document.createElement('div');
      rankPanel.className = 'rank-panel';
      const maxVal = top20.length ? top20[0][sortBy] : 1;
      let html = '<h3>Top 20 · ' + ko(sortBy) + ' 기준 랭킹</h3><div class="h3-sub">' + TYPE_INFO[currentType].ko + ' 카테고리 상위 20</div><div class="rank-list">';
      top20.forEach((r, i) => {
        const width = maxVal > 0 ? (r[sortBy]/maxVal*100) : 0;
        html += '<div class="rank-row">' +
          '<div class="num">' + (i+1) + '</div>' +
          '<div class="lbl" title="' + r.name + '">' + r.name + '</div>' +
          '<div class="bar-outer"><div class="bar-inner" style="width:' + Math.max(width, 3) + '%">' + fmt(r[sortBy]) + '</div></div>' +
          '<div class="val">' + fmt(r[sortBy]) + '</div></div>';
      });
      html += '</div>';
      rankPanel.innerHTML = html;
      content.appendChild(rankPanel);

      // Top 20 상세 테이블
      const tblBox = document.createElement('div');
      tblBox.className = 'chart-box';
      let tblHtml = '<h3>Top 20 상세 지표</h3><div class="h3-sub">사용자·구매·매출·전환율·객단가 비교</div><div style="overflow-x:auto"><table>' +
        '<thead><tr><th style="text-align:left">순위</th><th style="text-align:left">카테고리</th>' +
        '<th>사용자</th><th>세션</th><th>구매</th><th>매출</th><th>전환율(%)</th><th>객단가</th></tr></thead><tbody>';
      top20.forEach((r, i) => {
        tblHtml += '<tr><td style="text-align:left">' + (i+1) + '</td><td style="text-align:left"><b>' + r.name + '</b></td>' +
          '<td>' + fmt(r.users) + '</td><td>' + fmt(r.sessions) + '</td><td>' + fmt(r.purchases) + '</td>' +
          '<td>' + fmt(r.revenue) + '</td><td>' + fmt(r.cvr_user_pct) + '</td><td>' + fmt(r.aov) + '</td></tr>';
      });
      tblHtml += '</tbody></table></div>';
      tblBox.innerHTML = tblHtml;
      content.appendChild(tblBox);
    }
    draw();
  } catch(e) { statusEl.textContent = '⚠️ ' + e.message; }
}
</script>
</body></html>
