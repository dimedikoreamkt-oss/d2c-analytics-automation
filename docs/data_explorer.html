<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Explorer · D2C Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="mart_common.css">
<style>
  .tab-bar {
    display:flex; gap:4px; background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius); padding:4px; margin-bottom:20px; overflow-x:auto;
  }
  .tab-btn {
    padding:8px 14px; border-radius:8px; background:transparent; border:none;
    font-size:13px; font-weight:600; color:var(--text-secondary); cursor:pointer;
    white-space:nowrap; font-family:inherit; transition:all .15s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .tab-btn:hover { background:var(--bg); color:var(--text); }
  .tab-btn.active { background:var(--primary); color:white; }
  .tab-btn .tab-num {
    font-size:10px; opacity:0.7; font-family:'JetBrains Mono',monospace;
    background:rgba(0,0,0,0.06); padding:1px 5px; border-radius:3px;
  }
  .tab-btn.active .tab-num { background:rgba(255,255,255,0.2); opacity:0.9; }
  #root { min-height:400px; }
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta">Last updated: 2026-07-22</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard / Data Explorer</div>
      <h1>Data Explorer</h1>
      <div class="desc">전 영역 데이터를 하나의 시트에서 탐색합니다. 상단 탭으로 데이터셋을 전환하고, 날짜·지표·카테고리 필터로 원하는 뷰를 만드세요.</div>
      <div class="meta-row"><span id="status">데이터 준비 중...</span></div>
    </div>

    <div class="tab-bar" id="tabBar"></div>
    <div id="root"></div>
  </main>
</div>

<script>window.__skipAutoInit = true;</script>
<script src="mart_common.js"></script>
<script>
const DATASETS = [
  { id:'1',  file:'data/mart1_daily_kpi.json',      label:'일별 KPI',       icon:'trending-up' },
  { id:'2',  file:'data/mart2_funnel.json',         label:'퍼널 이탈',       icon:'filter' },
  { id:'3',  file:'data/mart3_cohort.json',         label:'코호트 리텐션',   icon:'users' },
  { id:'4',  file:'data/mart4_attribution.json',    label:'어트리뷰션',     icon:'git-branch' },
  { id:'5',  file:'data/mart5_ltv_rfm.json',        label:'LTV / RFM',      icon:'crown' },
  { id:'7',  file:'data/mart7_day_hour.json',       label:'요일×시간대',     icon:'calendar-clock' },
  { id:'8',  file:'data/mart8_engagement.json',     label:'콘텐츠 참여',     icon:'activity' },
  { id:'9',  file:'data/mart9_dark_social.json',    label:'다크소셜',       icon:'sparkles' },
  { id:'13', file:'data/mart13_demographics.json',  label:'인구통계',       icon:'user-check' },
  { id:'14', file:'data/mart14_interest.json',      label:'관심사',         icon:'heart' }
];

function buildTabs(){
  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = DATASETS.map((d,i) => `
    <button class="tab-btn ${i===0?'active':''}" data-file="${d.file}" data-id="${d.id}">
      <i data-lucide="${d.icon}" style="width:14px;height:14px;"></i>
      ${d.label}
      <span class="tab-num">M${d.id}</span>
    </button>
  `).join('');
  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      initMart(btn.dataset.file);
    });
  });
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  buildTabs();
  initMart(DATASETS[0].file);
});
</script>
</body>
</html>
