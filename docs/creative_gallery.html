<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광고 소재 성과 갤러리</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mart_common.css">
<style>
  body{font-family:'Inter','Noto Sans KR',sans-serif;background:#f5f7fa;margin:0;}
  .wrap{max-width:1400px;margin:0 auto;padding:24px;}
  .head{margin-bottom:24px;}
  .head h1{font-size:26px;font-weight:700;margin:0 0 6px;color:#111;}
  .head .desc{color:#6b7280;font-size:14px;margin:0;}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0;background:#fff;padding:14px;border-radius:12px;border:1px solid #e5e7eb;}
  .controls select,.controls input{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;background:#fff;}
  .view-toggle{margin-left:auto;display:flex;gap:6px;}
  .view-toggle button{padding:8px 14px;border:1px solid #d1d5db;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;}
  .view-toggle button.active{background:#2563eb;color:#fff;border-color:#2563eb;}
  .adset-group{background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:16px;overflow:hidden;}
  .adset-header{padding:16px 20px;background:linear-gradient(90deg,#f8fafc,#fff);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:14px;cursor:pointer;}
  .adset-header:hover{background:#f1f5f9;}
  .adset-icon{font-size:22px;}
  .adset-title{flex:1;}
  .adset-title h3{margin:0 0 4px;font-size:15px;font-weight:700;color:#111;}
  .adset-title .path{font-size:12px;color:#6b7280;}
  .adset-stats{display:flex;gap:16px;font-size:12px;color:#374151;}
  .adset-stat{text-align:right;}
  .adset-stat .v{font-weight:700;color:#111;font-size:14px;}
  .adset-stat .l{color:#6b7280;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;}
  .adset-body{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .adset-body.collapsed{display:none;}
  .c-card{background:#fff;border:2px solid #e5e7eb;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative;}
  .c-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,80,200,0.12);}
  .c-card.winner{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15);}
  .c-card.loser{border-color:#ef4444;opacity:0.75;}
  .c-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;z-index:2;}
  .c-badge.winner{background:#10b981;color:#fff;}
  .c-badge.loser{background:#ef4444;color:#fff;}
  .c-badge.monitor{background:#f59e0b;color:#fff;}
  .c-thumb{width:100%;height:240px;object-fit:cover;background:#f3f4f6;display:block;}
  .c-body{padding:12px;}
  .c-name{font-size:13px;font-weight:600;color:#111;margin-bottom:8px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .c-kpi{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .k{background:#f9fafb;padding:6px 8px;border-radius:5px;}
  .k .l{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:0.4px;}
  .k .v{font-size:13px;font-weight:700;color:#111;}
  .k .v.good{color:#059669;}
  .k .v.bad{color:#dc2626;}
  .status-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;margin-left:6px;}
  .status-ACTIVE{background:#d1fae5;color:#065f46;}
  .status-PAUSED{background:#fef3c7;color:#92400e;}
  .status-ARCHIVED{background:#e5e7eb;color:#4b5563;}
  .status-CAMPAIGN_PAUSED,.status-ADSET_PAUSED{background:#fee2e2;color:#991b1b;}
  .empty{text-align:center;padding:60px;color:#9ca3af;background:#fff;border-radius:12px;}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <nav><a href="index.html">대시보드</a> · <a href="creative_gallery.html" class="active">소재 갤러리</a></nav>
</header>

<div class="wrap">
  <div class="head">
    <h1>🎨 광고 소재 성과 갤러리</h1>
    <p class="desc">광고세트별로 소재를 묶어서 A/B 비교 · 자동 승자·패자 판정 · Meta+GA 통합 성과</p>
  </div>

  <div class="controls">
    <select id="filterCampaign"><option value="">전체 캠페인</option></select>
    <select id="filterStatus">
      <option value="">전체 상태</option>
      <option value="ACTIVE">활성만</option>
      <option value="PAUSED">일시정지</option>
      <option value="ARCHIVED">아카이브</option>
    </select>
    <select id="filterDateRange">
      <option value="7">최근 7일</option>
      <option value="14">최근 14일</option>
      <option value="30" selected>최근 30일</option>
    </select>
    <select id="sortBy">
      <option value="spend_krw">지출순</option>
      <option value="ga_roas">GA ROAS순</option>
      <option value="ctr_pct">CTR순</option>
      <option value="ga_purchases">구매순</option>
    </select>
    <input type="text" id="searchName" placeholder="소재명 검색...">
    <div class="view-toggle">
      <button data-view="grouped" class="active">📁 그룹 뷰</button>
      <button data-view="flat">▦ 평면 뷰</button>
    </div>
  </div>

  <p id="summary" style="color:#6b7280;font-size:13px;">데이터 로딩 중...</p>
  <div id="content"></div>
</div>

<script>
let CREATIVES=[], PERF=[], VIEW='grouped', SORT='spend_krw';

async function load(){
  try{
    const [c,p]=await Promise.all([
      fetch('data/meta_creatives.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/mart19_creatives.json?t='+Date.now()).then(r=>r.json())
    ]);
    CREATIVES=c; PERF=p;
    initControls();
    render();
  }catch(e){
    document.getElementById('summary').textContent='⚠️ 데이터 로드 실패: '+e.message;
  }
}

function aggregate(days){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
  const agg={};
  PERF.filter(r=>new Date(r.event_date)>=cutoff).forEach(r=>{
    const k=r.ad_id;
    if(!agg[k]) agg[k]={impressions:0,reach:0,spend_krw:0,clicks:0,ga_purchases:0,ga_revenue:0,meta_purchases:0,ga_add_to_cart:0,ga_sessions:0};
    agg[k].impressions+=+r.impressions||0;
    agg[k].reach=Math.max(agg[k].reach,+r.reach||0);
    agg[k].spend_krw+=+r.spend_krw||0;
    agg[k].clicks+=+r.clicks||0;
    agg[k].ga_purchases+=+r.ga_purchases||0;
    agg[k].ga_revenue+=+r.ga_revenue||0;
    agg[k].meta_purchases+=+r.meta_purchases||0;
    agg[k].ga_add_to_cart+=+r.ga_add_to_cart||0;
    agg[k].ga_sessions+=+r.ga_sessions||0;
  });
  Object.values(agg).forEach(v=>{
    v.ctr_pct=v.impressions?v.clicks/v.impressions*100:0;
    v.ga_roas=v.spend_krw?v.ga_revenue/v.spend_krw:0;
    v.cpc=v.clicks?v.spend_krw/v.clicks:0;
  });
  return agg;
}

function initControls(){
  const camps=[...new Set(CREATIVES.map(c=>c.campaign_name).filter(Boolean))].sort();
  const sel=document.getElementById('filterCampaign');
  camps.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  ['filterCampaign','filterStatus','filterDateRange','searchName','sortBy'].forEach(id=>{
    document.getElementById(id).addEventListener('change',render);
    if(id==='searchName') document.getElementById(id).addEventListener('input',render);
  });
  document.querySelectorAll('.view-toggle button').forEach(b=>{
    b.addEventListener('click',e=>{
      document.querySelectorAll('.view-toggle button').forEach(x=>x.classList.remove('active'));
      e.target.classList.add('active');
      VIEW=e.target.dataset.view;
      render();
    });
  });
}

function fmt(n,d=0){if(n==null||isNaN(n))return'-';return Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});}

function classifyCreative(perf, allInAdset){
  // adset 내 상대적 순위 기반 자동 판정
  if(perf.spend_krw<10000) return null; // 지출 너무 적음 = 판정 보류
  const roasList=allInAdset.map(x=>x.ga_roas).filter(x=>x>0);
  const spendList=allInAdset.map(x=>x.spend_krw);
  if(allInAdset.length<2) return null; // A/B 하려면 최소 2개 필요
  const maxRoas=Math.max(...roasList,0);
  if(perf.ga_roas>=maxRoas && perf.ga_roas>=0.5) return {tag:'winner',label:'🏆 승자'};
  if(perf.spend_krw>50000 && perf.ga_roas<0.2) return {tag:'loser',label:'🚨 정지 권장'};
  return {tag:'monitor',label:'👀 관찰'};
}

function render(){
  const days=+document.getElementById('filterDateRange').value;
  const campFilter=document.getElementById('filterCampaign').value;
  const statusFilter=document.getElementById('filterStatus').value;
  const searchQ=document.getElementById('searchName').value.toLowerCase();
  SORT=document.getElementById('sortBy').value;

  const perf=aggregate(days);

  let list=CREATIVES.filter(c=>{
    if(campFilter && c.campaign_name!==campFilter) return false;
    if(statusFilter && c.effective_status!==statusFilter) return false;
    if(searchQ && !(c.ad_name||'').toLowerCase().includes(searchQ)) return false;
    return true;
  }).map(c=>({...c, _perf: perf[c.ad_id]||{spend_krw:0,ctr_pct:0,ga_roas:0,ga_purchases:0,impressions:0,cpc:0}}));

  document.getElementById('summary').textContent=`총 ${list.length}개 소재 · 최근 ${days}일 · ${VIEW==='grouped'?'광고세트별 그룹':'평면'} 뷰`;

  const content=document.getElementById('content');
  content.innerHTML='';

  if(!list.length){content.innerHTML='<div class="empty">표시할 소재가 없습니다.</div>';return;}

  if(VIEW==='flat'){
    const grid=document.createElement('div');
    grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;';
    list.sort((a,b)=>(b._perf[SORT]||0)-(a._perf[SORT]||0));
    list.forEach(c=>grid.appendChild(makeCard(c,null)));
    content.appendChild(grid);
    return;
  }

  // grouped view: campaign > adset > creatives
  const groups={};
  list.forEach(c=>{
    const key=`${c.campaign_name||'(unknown)'}||${c.adset_name||'(unknown)'}`;
    if(!groups[key]) groups[key]={campaign:c.campaign_name,adset:c.adset_name,creatives:[]};
    groups[key].creatives.push(c);
  });

  Object.values(groups).forEach(g=>{
    // 광고세트 통합 지표
    const totalSpend=g.creatives.reduce((s,c)=>s+c._perf.spend_krw,0);
    const totalRev=g.creatives.reduce((s,c)=>s+(c._perf.ga_revenue||0),0);
    const avgRoas=totalSpend?totalRev/totalSpend:0;
    const totalImps=g.creatives.reduce((s,c)=>s+c._perf.impressions,0);
    const totalClicks=g.creatives.reduce((s,c)=>s+c._perf.clicks,0);
    const avgCtr=totalImps?totalClicks/totalImps*100:0;

    const box=document.createElement('div');
    box.className='adset-group';
    const perfList=g.creatives.map(c=>c._perf);

    box.innerHTML=`
      <div class="adset-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <div class="adset-icon">📁</div>
        <div class="adset-title">
          <h3>${g.adset||'(광고세트 없음)'}</h3>
          <div class="path">${g.campaign||'(캠페인 없음)'}</div>
        </div>
        <div class="adset-stats">
          <div class="adset-stat"><div class="v">${g.creatives.length}</div><div class="l">소재</div></div>
          <div class="adset-stat"><div class="v">₩${fmt(totalSpend)}</div><div class="l">지출</div></div>
          <div class="adset-stat"><div class="v">${fmt(avgCtr,2)}%</div><div class="l">평균 CTR</div></div>
          <div class="adset-stat"><div class="v ${avgRoas>=1?'good':avgRoas>0?'bad':''}">${fmt(avgRoas,2)}x</div><div class="l">평균 ROAS</div></div>
        </div>
      </div>
      <div class="adset-body"></div>
    `;
    const body=box.querySelector('.adset-body');
    g.creatives.sort((a,b)=>(b._perf[SORT]||0)-(a._perf[SORT]||0));
    g.creatives.forEach(c=>body.appendChild(makeCard(c,perfList)));
    content.appendChild(box);
  });
}

function makeCard(c,adsetPerfList){
  const p=c._perf;
  const verdict=adsetPerfList?classifyCreative(p,adsetPerfList):null;
  const card=document.createElement('div');
  card.className='c-card'+(verdict?' '+verdict.tag:'');
  card.onclick=()=>window.location.href=`creative_detail.html?ad_id=${encodeURIComponent(c.ad_id)}`;
  const img=c.local_image_path||c.thumbnail_url||'';
  card.innerHTML=`
    ${verdict?`<div class="c-badge ${verdict.tag}">${verdict.label}</div>`:''}
    <img class="c-thumb" src="${img}" onerror="this.src='https://via.placeholder.com/260x240/f3f4f6/9ca3af?text=No+Image'">
    <div class="c-body">
      <div class="c-name">${c.ad_name||'(이름 없음)'}<span class="status-badge status-${c.effective_status}">${c.effective_status||''}</span></div>
      <div class="c-kpi">
        <div class="k"><div class="l">지출</div><div class="v">₩${fmt(p.spend_krw)}</div></div>
        <div class="k"><div class="l">노출</div><div class="v">${fmt(p.impressions)}</div></div>
        <div class="k"><div class="l">CTR</div><div class="v">${fmt(p.ctr_pct,2)}%</div></div>
        <div class="k"><div class="l">GA ROAS</div><div class="v ${p.ga_roas>=1?'good':p.ga_roas>0?'bad':''}">${fmt(p.ga_roas,2)}x</div></div>
        <div class="k"><div class="l">구매</div><div class="v">${fmt(p.ga_purchases)}건</div></div>
        <div class="k"><div class="l">CPC</div><div class="v">₩${fmt(p.cpc)}</div></div>
      </div>
    </div>`;
  return card;
}

load();
</script>
</body>
</html>
