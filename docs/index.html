<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2C Analytics · Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="mart_common.css">
<style>
  .overview-hero { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:24px; }
  @media (max-width:1100px){ .overview-hero{ grid-template-columns:repeat(2,1fr);} }
  .oh-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
  .oh-card .oh-lbl { font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .oh-card .oh-val { font-size:26px; font-weight:700; margin:8px 0 4px; letter-spacing:-.5px; }
  .oh-card .oh-delta { font-size:12px; font-weight:600; display:inline-flex; align-items:center; gap:3px; }
  .oh-card .oh-delta.up { color:var(--success); }
  .oh-card .oh-delta.down { color:var(--danger); }
  .oh-card .oh-delta.flat { color:var(--text-muted); }
  .section-title { font-size:15px; font-weight:700; color:var(--text); margin:32px 0 12px; display:flex; align-items:center; gap:8px; }
  .section-title svg { color:var(--text-muted); width:18px; height:18px; }
  .active-ads { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; }
  .ad-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:all .15s; text-decoration:none; color:var(--text); }
  .ad-card:hover { border-color:var(--primary); box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .ad-card .ad-img { width:100%; aspect-ratio:1/1; background:var(--bg); object-fit:cover; display:block; }
  .ad-card .ad-body { padding:14px 16px; }
  .ad-card .ad-name { font-size:13px; font-weight:600; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ad-card .ad-meta { font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ad-card .ad-metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .ad-card .ad-m-lbl { font-size:10px; color:var(--text-muted); text-transform:uppercase; font-weight:600; }
  .ad-card .ad-m-val { font-size:14px; font-weight:700; margin-top:2px; }
  .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; }
  .status-active { background:var(--success); }
  .action-list { display:flex; flex-direction:column; gap:8px; }
  .action-item { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; display:flex; align-items:flex-start; gap:12px; }
  .action-item .a-ico { width:36px; height:36px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .action-item.warn .a-ico { background:#fef3c7; color:#a16207; }
  .action-item.bad  .a-ico { background:#fee2e2; color:#b91c1c; }
  .action-item.good .a-ico { background:#dcfce7; color:#15803d; }
  .action-item.info .a-ico { background:#dbeafe; color:#1e40af; }
  .action-item .a-body { flex:1; min-width:0; }
  .action-item .a-title { font-size:13.5px; font-weight:600; margin-bottom:4px; }
  .action-item .a-desc  { font-size:12px; color:var(--text-secondary); line-height:1.5; }
  .action-item .a-metrics { display:inline-flex; gap:10px; margin-top:6px; font-size:11px; color:var(--text-muted); }
  .action-item .a-metrics b { color:var(--text); }
  .action-item .a-link  { font-size:12px; color:var(--primary); text-decoration:none; margin-top:6px; display:inline-flex; align-items:center; gap:4px; }
  .trend-wrap { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; }
  .trend-wrap h3 { font-size:14px; font-weight:700; margin-bottom:4px; }
  .trend-wrap .h3-sub { font-size:12px; color:var(--text-muted); margin-bottom:16px; }
  .trend-wrap canvas { max-height:280px; }
  .empty-state { padding:40px 24px; text-align:center; color:var(--text-muted); font-size:13px; background:var(--white); border:1px dashed var(--border); border-radius:var(--radius); }
  .audience-hero { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
  @media (max-width:1100px){ .audience-hero{ grid-template-columns:repeat(2,1fr);} }
  .aud-card { background:linear-gradient(135deg,#f8fafc 0%,#ffffff 100%); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
  .aud-lbl { font-size:11px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .aud-val { font-size:19px; font-weight:700; margin:6px 0 2px; }
  .aud-sub { font-size:11px; color:var(--text-secondary); }
  .aud-metric { font-size:11px; color:var(--success); font-weight:600; margin-top:2px; }
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta" id="lastUpdated">Loading…</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard</div>
      <h1>Overview</h1>
      <div class="desc">최근 7일 광고 성과 요약과 집행 중인 광고, 개선 액션 제안입니다. 소재 카드를 클릭하면 상세 성과와 개선 제안으로 이동합니다.</div>
    </div>

    <div class="overview-hero" id="heroGrid"></div>

    <div class="trend-wrap">
      <h3>일별 지출 vs 매출 (최근 7일)</h3>
      <div class="h3-sub">Meta 데이터 기준</div>
      <canvas id="trendChart"></canvas>
    </div>

    <div class="section-title"><i data-lucide="target"></i> Meta 오디언스 인사이트 <span id="audSub" style="font-size:12px;font-weight:400;color:var(--text-muted);"></span></div>
    <div class="audience-hero" id="audienceGrid"></div>

    <div class="section-title">
      <i data-lucide="play-circle"></i> 현재 집행 중인 광고
      <span id="activeCount" style="font-size:12px;font-weight:400;color:var(--text-muted);"></span>
    </div>
    <div class="active-ads" id="activeAds"></div>

    <div class="section-title">
      <i data-lucide="alert-triangle"></i> 개선 액션
      <span id="actionCount" style="font-size:12px;font-weight:400;color:var(--text-muted);"></span>
    </div>
    <div class="action-list" id="actionList"></div>
  </main>
</div>

<script>
const KRW = n => (n||0).toLocaleString('ko-KR') + '원';
const NUM = n => (n||0).toLocaleString('ko-KR');
const XN  = n => Math.abs(n||0) >= 1000000 ? ((n/1000000).toFixed(1)+'M') : Math.abs(n||0) >= 1000 ? ((n/1000).toFixed(1)+'K') : (n||0).toString();

function deltaBadge(cur, prev){
  if(!isFinite(cur)||!isFinite(prev)||prev===0) return '<span class="oh-delta flat">–</span>';
  const d = (cur-prev)/Math.abs(prev)*100;
  const cls = d > 0.5 ? 'up' : d < -0.5 ? 'down' : 'flat';
  const arrow = d > 0.5 ? '↑' : d < -0.5 ? '↓' : '–';
  return `<span class="oh-delta ${cls}">${arrow} ${(d>=0?'+':'')}${d.toFixed(1)}%</span>`;
}

function buildSidebar(){
  const marts = [
    ['index.html',                 'H',  'Overview'],
    ['creative_intelligence.html', 'CI', '소재 인텔리전스'],
    ['budget_optimizer.html',      'BO', '예산 최적화'],
    ['data_explorer.html',         'DE', '데이터 익스플로러'],
    ['mart6.html',                 '6',  '신규 vs 재방문'],
    ['mart16.html',                '16', '채널 딥다이브'],
    ['mart17.html',                '17', '광고 CAC / ROAS']
  ];
  const sidebar = document.querySelector('.sidebar');
  if(!sidebar) return;
  const cur = location.pathname.split('/').pop() || 'index.html';
  sidebar.innerHTML =
    '<div class="sec-label">Analytics</div>' +
    marts.map(([h,t,n]) => `<a href="${h}" class="${h===cur?'active':''}"><span class="num">${t}</span> ${n}</a>`).join('');
}


async function loadData(){
  buildSidebar();
  try {
    const [mart19, meta, mart21, mart22, mart23, mart20] = await Promise.all([
      fetch('data/mart19_creatives.json?t='+Date.now()).then(r=>r.ok?r.json():[]),
      fetch('data/meta_creatives.json?t='+Date.now()).then(r=>r.ok?r.json():[]),
      fetch('data/mart21_fatigue.json?t='+Date.now()).then(r=>r.ok?r.json():[]),
      fetch('data/mart22_creative_demographics.json?t='+Date.now()).then(r=>r.ok?r.json():[]),
      fetch('data/mart23_creative_platform.json?t='+Date.now()).then(r=>r.ok?r.json():[]),
      fetch('data/mart20_appeal.json?t='+Date.now()).then(r=>r.ok?r.json():[])
    ]);

    const today = new Date(); today.setUTCHours(0,0,0,0);
    const d7  = new Date(today); d7.setUTCDate(today.getUTCDate()-7);
    const d14 = new Date(today); d14.setUTCDate(today.getUTCDate()-14);
    const fmt = d => d.toISOString().slice(0,10);
    const now7  = mart19.filter(r => r.event_date >= fmt(d7)  && r.event_date <  fmt(today));
    const prev7 = mart19.filter(r => r.event_date >= fmt(d14) && r.event_date <  fmt(d7));

    /* === Hero KPI (기존 유지) === */
    const agg = rows => ({
      spend:  rows.reduce((s,r)=>s+(+r.spend_krw||0),0),
      imp:    rows.reduce((s,r)=>s+(+r.impressions||0),0),
      clicks: rows.reduce((s,r)=>s+(+r.clicks||0),0),
      purc:   rows.reduce((s,r)=>s+(+r.meta_purchases||0),0),
      rev:    rows.reduce((s,r)=>s+(+r.meta_purchase_value||0),0)
    });
    const cur = agg(now7), pv = agg(prev7);
    const curRoas = cur.spend ? cur.rev/cur.spend : 0;
    const pvRoas  = pv.spend  ? pv.rev/pv.spend  : 0;
    const curCtr  = cur.imp ? cur.clicks/cur.imp*100 : 0;
    const pvCtr   = pv.imp  ? pv.clicks/pv.imp*100  : 0;

    document.getElementById('heroGrid').innerHTML = [
      ['지출',  KRW(cur.spend), deltaBadge(cur.spend, pv.spend)],
      ['노출',  XN(cur.imp),    deltaBadge(cur.imp,   pv.imp)],
      ['CTR',   curCtr.toFixed(2)+'%', deltaBadge(curCtr, pvCtr)],
      ['구매',  NUM(cur.purc),  deltaBadge(cur.purc,  pv.purc)],
      ['ROAS',  curRoas.toFixed(2)+'x', deltaBadge(curRoas, pvRoas)]
    ].map(([lbl,val,delta])=>`
      <div class="oh-card">
        <div class="oh-lbl">${lbl}</div>
        <div class="oh-val">${val}</div>
        ${delta}
      </div>
    `).join('');

    /* === Trend Chart === */
    const daily = {};
    now7.forEach(r => {
      const d = r.event_date;
      if(!daily[d]) daily[d] = { spend:0, rev:0 };
      daily[d].spend += +r.spend_krw||0;
      daily[d].rev   += +r.meta_purchase_value||0;
    });
    const dates = Object.keys(daily).sort();
    new Chart(document.getElementById('trendChart'), {
      type:'line',
      data:{
        labels: dates.map(d=>d.slice(5)),
        datasets:[
          { label:'지출', data: dates.map(d=>daily[d].spend), borderColor:'#0066FF', backgroundColor:'rgba(0,102,255,0.10)', tension:0.35, fill:true, yAxisID:'y' },
          { label:'매출', data: dates.map(d=>daily[d].rev),   borderColor:'#00A76F', backgroundColor:'rgba(0,167,111,0.10)', tension:0.35, fill:false, yAxisID:'y' }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'top', labels:{font:{size:11}} } },
        scales:{ y:{ beginAtZero:true, ticks:{color:'#8892A6'} }, x:{ ticks:{color:'#8892A6'} } }
      }
    });

    /* === Audience Insight (NEW - Mart 22/23) === */
    const demo7 = mart22.filter(r => r.event_date >= fmt(d7) && r.event_date < fmt(today));
    const plat7 = mart23.filter(r => r.event_date >= fmt(d7) && r.event_date < fmt(today));

    const aggBy = (rows, keyFn) => {
      const agg = {};
      rows.forEach(r => {
        const k = keyFn(r);
        if(!k || k === 'unknown - unknown') return;
        if(!agg[k]) agg[k] = { spend:0, imp:0, clicks:0, purc:0, rev:0 };
        agg[k].spend += +r.spend_krw||0;
        agg[k].imp   += +r.impressions||0;
        agg[k].clicks+= +r.clicks||0;
        agg[k].purc  += +r.meta_purchases||0;
        agg[k].rev   += +r.meta_purchase_value||0;
      });
      return Object.entries(agg).map(([k,v]) => ({
        key:k, ...v,
        roas: v.spend ? v.rev/v.spend : 0,
        ctr:  v.imp ? v.clicks/v.imp*100 : 0
      }));
    };

    const byAge    = aggBy(demo7, r => r.age_bracket).filter(x => x.spend >= 5000).sort((a,b) => b.roas - a.roas);
    const byGender = aggBy(demo7, r => r.gender).filter(x => x.spend >= 5000).sort((a,b) => b.roas - a.roas);
    const byPlace  = aggBy(plat7, r => (r.publisher_platform||'unknown')+' - '+(r.platform_position||'unknown')).filter(x => x.spend >= 3000).sort((a,b) => b.roas - a.roas);
    const byRegion = aggBy(demo7, r => r.region).filter(x => x.spend >= 3000).sort((a,b) => b.roas - a.roas);

    const bestAge    = byAge[0];
    const bestGender = byGender[0];
    const bestPlace  = byPlace[0];

    document.getElementById('audSub').textContent = ' · 최근 7일 (지출 5,000원 이상 세그먼트)';

    document.getElementById('audienceGrid').innerHTML = [
      ['Best Age Group',   bestAge    ? bestAge.key    : '-', bestAge    ? `ROAS ${bestAge.roas.toFixed(2)}x · 구매 ${bestAge.purc}건` : '데이터 부족', bestAge?KRW(bestAge.rev):''],
      ['Best Gender',      bestGender ? (bestGender.key==='female'?'여성':bestGender.key==='male'?'남성':bestGender.key) : '-', bestGender ? `ROAS ${bestGender.roas.toFixed(2)}x · 구매 ${bestGender.purc}건` : '데이터 부족', bestGender?KRW(bestGender.rev):''],
      ['Best Placement',   bestPlace  ? bestPlace.key  : '-', bestPlace  ? `ROAS ${bestPlace.roas.toFixed(2)}x · 구매 ${bestPlace.purc}건` : '데이터 부족', bestPlace?KRW(bestPlace.rev):''],
      ['활성 세그먼트 수', `${byAge.length + byPlace.length}`, `연령 ${byAge.length} · 지면 ${byPlace.length}`, '']
    ].map(([lbl,val,sub,metric])=>`
      <div class="aud-card">
        <div class="aud-lbl">${lbl}</div>
        <div class="aud-val">${val}</div>
        <div class="aud-sub">${sub}</div>
        ${metric?`<div class="aud-metric">${metric}</div>`:''}
      </div>
    `).join('');

    /* === Active Ads (기존 유지) === */
    const activeAds = meta.filter(m => m.effective_status === 'ACTIVE');
    document.getElementById('activeCount').textContent = ` · ${activeAds.length}개`;
    const perfByAd = {};
    now7.forEach(r => {
      const id = r.ad_id;
      if(!perfByAd[id]) perfByAd[id] = { spend:0, imp:0, clicks:0, purc:0, rev:0 };
      const p = perfByAd[id];
      p.spend  += +r.spend_krw||0;
      p.imp    += +r.impressions||0;
      p.clicks += +r.clicks||0;
      p.purc   += +r.meta_purchases||0;
      p.rev    += +r.meta_purchase_value||0;
    });
    document.getElementById('activeAds').innerHTML = activeAds.length ? activeAds.map(ad => {
      const p = perfByAd[ad.ad_id] || {spend:0,imp:0,clicks:0,purc:0,rev:0};
      const roas = p.spend ? (p.rev/p.spend).toFixed(2)+'x' : '-';
      const ctr  = p.imp ? (p.clicks/p.imp*100).toFixed(2)+'%' : '-';
      const img  = ad.image_url || `creatives/${ad.ad_id}.jpg`;
      return `<a class="ad-card" href="creative_detail.html?ad_id=${ad.ad_id}">
        <img class="ad-img" src="${img}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2YxZjVmOSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjODg5MkE2IiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIxMCI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+'">
        <div class="ad-body">
          <div class="ad-name">${ad.ad_name||ad.ad_id}</div>
          <div class="ad-meta"><span class="status-dot status-active"></span>${ad.campaign_name||''}</div>
          <div class="ad-metrics">
            <div class="ad-m"><div class="ad-m-lbl">ROAS</div><div class="ad-m-val">${roas}</div></div>
            <div class="ad-m"><div class="ad-m-lbl">CTR</div><div class="ad-m-val">${ctr}</div></div>
          </div>
        </div>
      </a>`;
    }).join('') : '<div class="empty-state" style="grid-column:1/-1;">현재 활성 상태인 광고가 없습니다.</div>';

    /* === 개선 액션 (A2 확장) === */
    const actions = [];

    // Rule 1: 지면 ROAS < 0.2 & spend >= 5000 → 제외 권고
    byPlace.forEach(p => {
      if(p.spend >= 5000 && p.roas < 0.2 && p.purc === 0) {
        actions.push({
          tone:'bad', ico:'ban',
          title:`[지면 제외] ${p.key}`,
          desc:`지출 ${KRW(Math.round(p.spend))} 태워 매출 0원. Meta 어드민에서 이 지면 제외 필요.`,
          metrics:[`ROAS <b>${p.roas.toFixed(2)}x</b>`, `구매 <b>${p.purc}건</b>`, `노출 <b>${NUM(p.imp)}</b>`],
          href:'creative_intelligence.html'
        });
      }
    });

    // Rule 2: 지면 ROAS >= 0.5 & spend >= 100000 → 예산 증액 후보
    byPlace.forEach(p => {
      if(p.spend >= 100000 && p.roas >= 0.5 && p.purc >= 3) {
        actions.push({
          tone:'good', ico:'trending-up',
          title:`[예산 증액 후보] ${p.key}`,
          desc:`주력 지면. 예산 +20% 검토 시 예상 매출 +${KRW(Math.round(p.rev*0.2))}.`,
          metrics:[`ROAS <b>${p.roas.toFixed(2)}x</b>`, `구매 <b>${p.purc}건</b>`, `매출 <b>${KRW(Math.round(p.rev))}</b>`],
          href:'creative_intelligence.html'
        });
      }
    });

    // Rule 3: 연령대 ROAS >= 0.8 → 오디언스 확장
    byAge.forEach(a => {
      if(a.spend >= 10000 && a.roas >= 0.8) {
        actions.push({
          tone:'good', ico:'user-plus',
          title:`[오디언스 확장] ${a.key} 세그먼트 강세`,
          desc:`이 연령대에 유사 관심사 오디언스 확장 검토. Lookalike 1-3% 시드로 활용.`,
          metrics:[`ROAS <b>${a.roas.toFixed(2)}x</b>`, `구매 <b>${a.purc}건</b>`, `매출 <b>${KRW(Math.round(a.rev))}</b>`],
          href:'creative_intelligence.html'
        });
      }
    });

    // Rule 4: Mart 21 fatigue_grade 위험 or signal_count >= 3 → 즉시 교체
    mart21.forEach(f => {
      const signals = +f.signal_count || 0;
      const grade = String(f.fatigue_grade || '');
      const isDangerous = grade.includes('위험') || grade.includes('심각') || grade.toUpperCase().includes('CRITICAL') || signals >= 3;
      if(isDangerous) {
        const activeSignals = [];
        if(+f.sig_high_freq)     activeSignals.push('고빈도');
        if(+f.sig_ctr_decline)   activeSignals.push('CTR 하락');
        if(+f.sig_cpc_rise)      activeSignals.push('CPC 상승');
        if(+f.sig_cpm_rise)      activeSignals.push('CPM 상승');
        if(+f.sig_long_running)  activeSignals.push('장기 운영');
        actions.push({
          tone:'bad', ico:'refresh-cw',
          title:`[소재 교체 권고] ${(f.ad_name||f.ad_id||'').slice(0,40)}`,
          desc:`위험 신호: ${activeSignals.join(', ') || '피로도 감지'} · 새 크리에이티브 로테이션 필요.`,
          metrics:[`등급 <b>${grade||'-'}</b>`, `점수 <b>${+f.fatigue_score||0}</b>`, `Freq(7d) <b>${(+f.r7_freq||0).toFixed(2)}</b>`, `잔여 <b>${isFinite(+f.estimated_days_remaining)?(+f.estimated_days_remaining).toFixed(0)+'일':'-'}</b>`],
          href:`creative_detail.html?ad_id=${f.ad_id}`
        });
      }
    });

    // Rule 5: Mart 20 최고 성과 소구점 → 유사 소재 확장
    const appealAgg = {};
    mart20.filter(r => r.event_date >= fmt(d7) && r.appeal_tag !== '미분류').forEach(r => {
      const k = r.appeal_tag;
      if(!appealAgg[k]) appealAgg[k] = { spend:0, rev:0, purc:0 };
      appealAgg[k].spend += +r.spend_krw||0;
      appealAgg[k].rev   += +r.meta_purchase_value||0;
      appealAgg[k].purc  += +r.meta_purchases||0;
    });
    const bestAppeal = Object.entries(appealAgg)
      .map(([k,v]) => ({ appeal:k, ...v, roas: v.spend ? v.rev/v.spend : 0 }))
      .filter(x => x.spend >= 50000 && x.purc >= 2)
      .sort((a,b) => b.roas - a.roas)[0];
    if(bestAppeal) {
      actions.push({
        tone:'info', ico:'lightbulb',
        title:`[소구점 확장] "${bestAppeal.appeal}" 소구점 최고 성과`,
        desc:`이 소구점 컨셉으로 신규 소재 3~5개 추가 제작 권장.`,
        metrics:[`ROAS <b>${bestAppeal.roas.toFixed(2)}x</b>`, `구매 <b>${bestAppeal.purc}건</b>`, `매출 <b>${KRW(Math.round(bestAppeal.rev))}</b>`],
        href:'creative_intelligence.html'
      });
    }

    // Rule 6: 활성 소재 ROAS < 1.0 & spend >= 100k → 랜딩 점검
    activeAds.forEach(ad => {
      const p = perfByAd[ad.ad_id];
      if(!p) return;
      const roas = p.spend ? p.rev/p.spend : 0;
      const ctr  = p.imp ? p.clicks/p.imp*100 : 0;
      if(p.spend >= 100000 && roas < 1.0 && ctr >= 3.0) {
        actions.push({
          tone:'warn', ico:'external-link',
          title:`[랜딩 점검] ${(ad.ad_name||ad.ad_id).slice(0,40)}`,
          desc:`CTR ${ctr.toFixed(1)}%로 클릭은 활발하나 구매 전환이 낮음. 랜딩페이지 CVR/로딩속도/상세페이지 점검.`,
          metrics:[`ROAS <b>${roas.toFixed(2)}x</b>`, `CTR <b>${ctr.toFixed(2)}%</b>`, `지출 <b>${KRW(Math.round(p.spend))}</b>`],
          href:`creative_detail.html?ad_id=${ad.ad_id}`
        });
      }
    });

    // 액션 정렬: bad > warn > info > good
    const toneRank = { bad:0, warn:1, info:2, good:3 };
    actions.sort((a,b) => (toneRank[a.tone]||9) - (toneRank[b.tone]||9));

    document.getElementById('actionCount').textContent = ` · ${actions.length}건`;
    document.getElementById('actionList').innerHTML = actions.length ? actions.map(a=>`
      <div class="action-item ${a.tone}">
        <div class="a-ico"><i data-lucide="${a.ico}" style="width:18px;height:18px;"></i></div>
        <div class="a-body">
          <div class="a-title">${a.title}</div>
          <div class="a-desc">${a.desc}</div>
          ${a.metrics ? `<div class="a-metrics">${a.metrics.map(m=>`<span>${m}</span>`).join('')}</div>` : ''}
          <a class="a-link" href="${a.href}">상세 분석 <i data-lucide="arrow-right" style="width:12px;height:12px;"></i></a>
        </div>
      </div>
    `).join('') : '<div class="empty-state">현재 조치가 필요한 항목이 없습니다.</div>';

    document.getElementById('lastUpdated').textContent = 'Last updated: 2026-07-23';
    lucide.createIcons();

  } catch(e) {
    console.error(e);
    document.getElementById('heroGrid').innerHTML = `<div style="grid-column:1/-1;color:var(--danger);padding:20px;">데이터 로드 실패: ${e.message}</div>`;
  }
}
loadData();
</script>
</body>
</html>
