<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 16 · 광고 채널 딥다이브 | D2C Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="mart_common.css">
<style>
  .drill-breadcrumb { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; }
  .drill-breadcrumb .bc-item { padding: 4px 10px; background: var(--primary-light); color: var(--primary); border-radius: 6px; font-weight: 600; cursor: pointer; }
  .drill-breadcrumb .bc-item:hover { background: var(--primary); color: white; }
  .drill-breadcrumb .bc-sep { color: var(--text-muted); }
  .drill-breadcrumb .bc-reset { margin-left: auto; padding: 4px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
  .drill-breadcrumb .bc-reset:hover { border-color: var(--danger); color: var(--danger); }
  .drill-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .drill-table th { background: var(--bg); padding: 12px; text-align: right; font-size: 11px; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; border-bottom: 1px solid var(--border); }
  .drill-table th:first-child { text-align: left; }
  .drill-table td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border); }
  .drill-table td:first-child { text-align: left; }
  .drill-table tr.clickable { cursor: pointer; }
  .drill-table tr.clickable:hover td { background: var(--primary-50); }
  .drill-table .drill-btn { color: var(--primary); font-weight: 600; }
  .drill-table .val-highlight { color: var(--primary); font-weight: 700; }
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta">매일 KST 19:00 자동 갱신</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard / Growth Analytics</div>
      <h1>Mart 16 · 광고 채널 딥다이브</h1>
      <div class="desc">UTM 소스 → 매체 → 캠페인 → 소재 순서로 드릴다운하며 어느 조합이 실제로 성과가 나는지 파고듭니다. 각 행을 클릭하면 하위 브레이크다운으로 이동합니다.</div>
      <div class="meta-row"><span id="status">데이터 불러오는 중...</span></div>
    </div>
    <div id="root"></div>
  </main>
</div>
<script src="mart_common.js"></script>
<script>
window.addEventListener('load', () => setTimeout(() => {
  const root = document.getElementById('root');
  if (root) root.innerHTML = '';
  customRender();
}, 200));

const LEVELS = ['source', 'medium', 'campaign', 'ad_content'];
const LEVEL_KO = { source: '유입 소스', medium: '매체', campaign: '캠페인', ad_content: '소재' };

async function customRender() {
  const statusEl = document.getElementById('status');
  const root = document.getElementById('root');
  try {
    const res = await fetch('data/mart16_ad_channel.json?t=' + Date.now());
    if (!res.ok) throw new Error('데이터 파일을 찾을 수 없음');
    const rows = await res.json();
    if (!rows || !rows.length) { statusEl.textContent = '아직 데이터가 없습니다.'; return; }
    statusEl.textContent = '총 ' + rows.length.toLocaleString() + '행 로드됨';

    const allDates = [...new Set(rows.map(r => r.event_date))].sort();
    let range = buildDateFilter(root, allDates, v => { range = v; draw(); });

    const metrics = ['users', 'sessions', 'purchases', 'revenue', 'acquired_users', 'session_cvr_pct', 'user_cvr_pct', 'aov', 'atc_rate_pct'];
    let sortBy = 'revenue';
    const metricBar = document.createElement('div');
    metricBar.className = 'chip-bar';
    metricBar.innerHTML = '<div class="chip-label">' + ICONS.bar + ' 정렬 기준</div>' +
      metrics.map(k => '<span class="chip ' + (k === sortBy ? 'active' : '') + '" data-key="' + k + '">' +
        ko(k) + ' <span class="chip-en">' + k + '</span></span>').join('');
    root.appendChild(metricBar);
    metricBar.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => {
        sortBy = el.dataset.key;
        metricBar.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        draw();
      });
    });

    // 드릴다운 상태: 각 레벨의 선택된 값
    let drillPath = {}; // { source: 'facebook', medium: 'cpc' }

    const content = document.createElement('div');
    root.appendChild(content);

    function draw() {
      content.innerHTML = '';
      let filtered = filterByRange(rows, 'event_date', range.primaryStart, range.primaryEnd);
      Object.entries(drillPath).forEach(([k, v]) => {
        filtered = filtered.filter(r => r[k] === v);
      });
      if (!filtered.length) { content.innerHTML = '<p class="status">선택한 조건에 데이터가 없습니다.</p>'; return; }

      // 현재 드릴 레벨 결정
      const currentLevel = LEVELS.find(l => drillPath[l] === undefined) || LEVELS[LEVELS.length - 1];
      const levelIdx = LEVELS.indexOf(currentLevel);

      // 브레드크럼
      const bc = document.createElement('div');
      bc.className = 'drill-breadcrumb';
      let bcHtml = '<span style="color:var(--text-muted);font-weight:600;font-size:12px">현재 위치:</span>';
      bcHtml += '<span class="bc-item" data-lvl="__root__">전체</span>';
      LEVELS.forEach((l, i) => {
        if (drillPath[l] !== undefined) {
          bcHtml += '<span class="bc-sep">→</span>';
          bcHtml += '<span class="bc-item" data-lvl="' + l + '">' + LEVEL_KO[l] + ': <b>' + drillPath[l] + '</b></span>';
        }
      });
      bcHtml += '<button class="bc-reset">↺ 리셋</button>';
      bc.innerHTML = bcHtml;
      content.appendChild(bc);
      bc.querySelector('.bc-reset').addEventListener('click', () => { drillPath = {}; draw(); });
      bc.querySelectorAll('.bc-item').forEach(el => {
        el.addEventListener('click', () => {
          const lvl = el.dataset.lvl;
          if (lvl === '__root__') { drillPath = {}; }
          else {
            // 이 레벨까지 남기고 아래 다 제거
            const newPath = {};
            for (const l of LEVELS) {
              newPath[l] = drillPath[l];
              if (l === lvl) break;
            }
            // 이 레벨의 선택도 제거 (해당 레벨을 다시 선택하도록)
            delete newPath[lvl];
            drillPath = newPath;
          }
          draw();
        });
      });

      // 인사이트: 현재 뷰의 총합
      const totalUsers = sumBy(filtered, 'users');
      const totalRev = sumBy(filtered, 'revenue');
      const totalPurchases = sumBy(filtered, 'purchases');
      const totalAcquired = sumBy(filtered, 'acquired_users');
      const overallCvr = totalUsers > 0 ? (totalPurchases/totalUsers*100) : 0;

      const summary = document.createElement('div');
      summary.className = 'insight-box';
      summary.innerHTML = '<div class="i-title">' + ICONS.insight + ' 현재 조건 요약</div>' +
        '<div class="insight-item good"><span class="i-ico">' + ICONS.check + '</span><span class="i-txt">지금 뷰의 총 사용자 <b>' + fmt(totalUsers) + '명</b>, 신규 획득 <b>' + fmt(totalAcquired) + '명</b>, 구매 <b>' + fmt(totalPurchases) + '건</b>, 매출 <b>' + fmt(totalRev) + '</b>, 전환율 <b>' + overallCvr.toFixed(2) + '%</b></span></div>' +
        '<div class="insight-item good"><span class="i-ico">' + ICONS.check + '</span><span class="i-txt">아래 <b>' + LEVEL_KO[currentLevel] + '</b>별로 브레이크다운 중입니다. 각 행을 클릭하면 그 하위 레벨로 드릴다운됩니다.</span></div>';
      content.appendChild(summary);

      // 현재 레벨 브레이크다운 집계
      const agg = {};
      filtered.forEach(r => {
        const key = r[currentLevel] || '(none)';
        if (!agg[key]) agg[key] = { users:0, sessions:0, purchases:0, revenue:0, acquired_users:0, atc:0, cvrList:[], aovList:[] };
        agg[key].users += parseFloat(r.users) || 0;
        agg[key].sessions += parseFloat(r.sessions) || 0;
        agg[key].purchases += parseFloat(r.purchases) || 0;
        agg[key].revenue += parseFloat(r.revenue) || 0;
        agg[key].acquired_users += parseFloat(r.acquired_users) || 0;
        agg[key].atc += parseFloat(r.add_to_carts) || 0;
        if (isFinite(parseFloat(r.session_cvr_pct))) agg[key].cvrList.push(parseFloat(r.session_cvr_pct));
        if (isFinite(parseFloat(r.aov))) agg[key].aovList.push(parseFloat(r.aov));
      });
      const list = Object.entries(agg).map(([name, a]) => ({
        name,
        users: a.users, sessions: a.sessions, purchases: a.purchases, revenue: a.revenue,
        acquired_users: a.acquired_users,
        session_cvr_pct: a.cvrList.length ? a.cvrList.reduce((x,y)=>x+y,0)/a.cvrList.length : (a.sessions > 0 ? a.purchases/a.sessions*100 : 0),
        user_cvr_pct: a.users > 0 ? a.purchases/a.users*100 : 0,
        aov: a.purchases > 0 ? a.revenue/a.purchases : 0,
        atc_rate_pct: a.sessions > 0 ? a.atc/a.sessions*100 : 0
      }));
      list.sort((a,b) => (b[sortBy] || 0) - (a[sortBy] || 0));

      // 드릴다운 테이블
      const tblBox = document.createElement('div');
      tblBox.className = 'chart-box';
      let tblHtml = '<h3>' + LEVEL_KO[currentLevel] + '별 성과 <span class="chart-en">' + currentLevel + '</span></h3>' +
        '<div class="h3-sub">' + ko(sortBy) + ' 기준 내림차순 · 행 클릭 → 하위 레벨 드릴다운' + (levelIdx === LEVELS.length - 1 ? ' (마지막 레벨)' : '') + '</div>' +
        '<div style="overflow-x:auto"><table class="drill-table"><thead><tr>' +
        '<th>' + LEVEL_KO[currentLevel] + '</th>' +
        '<th>사용자</th><th>세션</th><th>신규 획득</th><th>구매</th><th>매출</th>' +
        '<th>세션 CVR (%)</th><th>객단가</th><th>ATC율 (%)</th>' +
        (levelIdx < LEVELS.length - 1 ? '<th></th>' : '') +
        '</tr></thead><tbody>';
      list.forEach(r => {
        const canDrill = levelIdx < LEVELS.length - 1;
        tblHtml += '<tr class="' + (canDrill ? 'clickable' : '') + '" data-key="' + r.name + '">' +
          '<td><b>' + r.name + '</b></td>' +
          '<td>' + fmt(r.users) + '</td>' +
          '<td>' + fmt(r.sessions) + '</td>' +
          '<td>' + fmt(r.acquired_users) + '</td>' +
          '<td>' + fmt(r.purchases) + '</td>' +
          '<td class="val-highlight">' + fmt(r.revenue) + '</td>' +
          '<td>' + r.session_cvr_pct.toFixed(2) + '</td>' +
          '<td>' + fmt(r.aov) + '</td>' +
          '<td>' + r.atc_rate_pct.toFixed(2) + '</td>' +
          (canDrill ? '<td class="drill-btn">더 보기 →</td>' : '') +
          '</tr>';
      });
      tblHtml += '</tbody></table></div>';
      tblBox.innerHTML = tblHtml;
      content.appendChild(tblBox);

      if (levelIdx < LEVELS.length - 1) {
        tblBox.querySelectorAll('tr.clickable').forEach(tr => {
          tr.addEventListener('click', () => {
            drillPath[currentLevel] = tr.dataset.key;
            draw();
          });
        });
      }
    }
    draw();
  } catch(e) { statusEl.textContent = '⚠️ ' + e.message; }
}
</script>
</body></html>
