<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 17 · CAC / ROAS | D2C Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="mart_common.css">
<style>
  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  @media (max-width: 900px) { .score-grid { grid-template-columns: 1fr 1fr; } }
  .score-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); }
  .score-card .lbl { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
  .score-card .val { font-size: 28px; font-weight: 800; margin: 8px 0 4px; letter-spacing: -0.5px; }
  .score-card .val.good { color: var(--success); }
  .score-card .val.warn { color: var(--warning); }
  .score-card .val.bad { color: var(--danger); }
  .score-card .desc { font-size: 11.5px; color: var(--text-muted); }
  .no-data-notice { background: var(--warning-light); border: 1px solid var(--warning); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; color: #7c4a00; font-size: 13px; }
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <div class="meta">매일 KST 19:00 자동 갱신</div>
</header>
<div class="layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="page-head">
      <div class="crumb">Dashboard / Growth Analytics</div>
      <h1>Mart 17 · 광고 CAC / ROAS</h1>
      <div class="desc">Meta · Google Ads 광고비를 GA4 성과와 자동 매칭해 실제 CAC · ROAS · LTV/CAC를 계산합니다. LTV/CAC ≥ 3이 건강한 유닛이코노믹스 기준입니다.</div>
      <div class="meta-row"><span id="status">데이터 불러오는 중...</span></div>
    </div>
    <div id="root"></div>
  </main>
</div>
<script src="mart_common.js"></script>
<script>
window.addEventListener('load', () => setTimeout(() => {
  const root = document.getElementById('root');
  if (root) root.innerHTML = '';
  customRender();
}, 200));

async function customRender() {
  const statusEl = document.getElementById('status');
  const root = document.getElementById('root');
  try {
    const res = await fetch('data/mart17_ad_spend.json?t=' + Date.now());
    if (!res.ok) throw new Error('데이터 파일을 찾을 수 없음');
    const rows = await res.json();
    if (!rows || !rows.length) { statusEl.textContent = '아직 데이터가 없습니다.'; return; }
    statusEl.textContent = '총 ' + rows.length.toLocaleString() + '행 로드됨';

    const hasSpend = rows.some(r => parseFloat(r.spend_krw) > 0);
    if (!hasSpend) {
      const notice = document.createElement('div');
      notice.className = 'no-data-notice';
      notice.innerHTML = '⚠️ <b>광고비 데이터가 아직 연동되지 않았습니다.</b> Meta Marketing API / Google Ads API 인증이 완료되고 매일 실행이 성공하면 자동으로 CAC · ROAS · LTV/CAC가 계산됩니다. 지금은 GA4 성과 지표만 표시됩니다.';
      root.appendChild(notice);
    }

    const allDates = [...new Set(rows.map(r => r.event_date))].sort();
    let range = buildDateFilter(root, allDates, v => { range = v; draw(); });

    const content = document.createElement('div');
    root.appendChild(content);

    function toneClass(metric, v) {
      if (!isFinite(v)) return '';
      if (metric === 'roas') return v >= 3 ? 'good' : (v >= 1 ? 'warn' : 'bad');
      if (metric === 'ltv_cac') return v >= 3 ? 'good' : (v >= 1 ? 'warn' : 'bad');
      if (metric === 'ctr') return v >= 2 ? 'good' : (v >= 1 ? 'warn' : 'bad');
      return '';
    }

    function draw() {
      content.innerHTML = '';
      const filtered = filterByRange(rows, 'event_date', range.primaryStart, range.primaryEnd);
      if (!filtered.length) { content.innerHTML = '<p class="status">선택 기간에 데이터가 없습니다.</p>'; return; }

      // 전체 요약 스코어카드
      const totalSpend = sumBy(filtered, 'spend_krw');
      const totalRev = sumBy(filtered, 'ga_revenue');
      const totalAcq = sumBy(filtered, 'acquired_users');
      const totalPurchases = sumBy(filtered, 'purchases');
      const totalClicks = sumBy(filtered, 'clicks');
      const totalImp = sumBy(filtered, 'impressions');
      const overallRoas = totalSpend > 0 ? totalRev/totalSpend : NaN;
      const overallCac = totalAcq > 0 ? totalSpend/totalAcq : NaN;
      const overallLtv = totalAcq > 0 ? totalRev/totalAcq : NaN;
      const overallLtvCac = isFinite(overallCac) && overallCac > 0 ? overallLtv/overallCac : NaN;
      const overallCtr = totalImp > 0 ? totalClicks/totalImp*100 : NaN;
      const overallCpc = totalClicks > 0 ? totalSpend/totalClicks : NaN;
      const overallCpa = totalPurchases > 0 ? totalSpend/totalPurchases : NaN;

      const scoreGrid = document.createElement('div');
      scoreGrid.className = 'score-grid';
      scoreGrid.innerHTML =
        '<div class="score-card"><div class="lbl">총 광고비 · Total Spend</div><div class="val">' + fmt(totalSpend) + '원</div><div class="desc">기준 기간 지출 총액</div></div>' +
        '<div class="score-card"><div class="lbl">GA 매출 · Revenue</div><div class="val">' + fmt(totalRev) + '원</div><div class="desc">GA4가 측정한 실제 매출</div></div>' +
        '<div class="score-card"><div class="lbl">ROAS · 매출 배수</div><div class="val ' + toneClass('roas', overallRoas) + '">' + (isFinite(overallRoas) ? overallRoas.toFixed(2) + 'x' : '-') + '</div><div class="desc">3.0x 이상이면 건강, 1.0x 미만 손해</div></div>' +
        '<div class="score-card"><div class="lbl">CAC · 신규 획득비</div><div class="val">' + (isFinite(overallCac) ? fmt(overallCac) + '원' : '-') + '</div><div class="desc">신규 유저 1명 획득 비용</div></div>' +
        '<div class="score-card"><div class="lbl">LTV · 획득당 매출</div><div class="val">' + (isFinite(overallLtv) ? fmt(overallLtv) + '원' : '-') + '</div><div class="desc">획득 유저 1명이 가져온 매출</div></div>' +
        '<div class="score-card"><div class="lbl">LTV/CAC 비율</div><div class="val ' + toneClass('ltv_cac', overallLtvCac) + '">' + (isFinite(overallLtvCac) ? overallLtvCac.toFixed(2) + 'x' : '-') + '</div><div class="desc">3.0x 이상이 건강한 유닛이코노믹스</div></div>' +
        '<div class="score-card"><div class="lbl">CTR · 클릭률</div><div class="val ' + toneClass('ctr', overallCtr) + '">' + (isFinite(overallCtr) ? overallCtr.toFixed(2) + '%' : '-') + '</div><div class="desc">2% 이상 양호</div></div>' +
        '<div class="score-card"><div class="lbl">CPC · 클릭당</div><div class="val">' + (isFinite(overallCpc) ? fmt(overallCpc) + '원' : '-') + '</div><div class="desc">평균 클릭당 비용</div></div>';
      content.appendChild(scoreGrid);

      // 인사이트
      const items = [];
      if (isFinite(overallRoas)) {
        if (overallRoas >= 3) items.push({tone:'good', icon:ICONS.check, text:'전체 ROAS가 <b>' + overallRoas.toFixed(2) + 'x</b>로 매우 건강합니다 — 예산 확대를 고려할 수 있습니다'});
        else if (overallRoas >= 1) items.push({tone:'warn', icon:ICONS.warn, text:'ROAS가 <b>' + overallRoas.toFixed(2) + 'x</b>로 손익분기는 넘겼지만 여유가 크지 않습니다. 상위 성과 캠페인에 예산을 재배분하세요'});
        else items.push({tone:'bad', icon:ICONS.alert, text:'ROAS가 <b>' + overallRoas.toFixed(2) + 'x</b>로 손해입니다. 지금 광고 계정 전면 재점검이 필요합니다'});
      }
      if (isFinite(overallLtvCac)) {
        if (overallLtvCac >= 3) items.push({tone:'good', icon:ICONS.check, text:'LTV/CAC가 <b>' + overallLtvCac.toFixed(2) + '</b>로 유닛이코노믹스가 매우 건강합니다'});
        else if (overallLtvCac < 1) items.push({tone:'bad', icon:ICONS.alert, text:'LTV/CAC가 <b>' + overallLtvCac.toFixed(2) + '</b>로 획득 비용이 매출보다 큽니다 — 리텐션 강화 또는 CAC 절감이 시급합니다'});
      }
      if (items.length) {
        const insBox = document.createElement('div');
        insBox.className = 'insight-box';
        insBox.innerHTML = '<div class="i-title">' + ICONS.insight + ' 전략 판단</div>' +
          items.map(i => '<div class="insight-item ' + i.tone + '"><span class="i-ico">' + i.icon + '</span><span class="i-txt">' + i.text + '</span></div>').join('');
        content.appendChild(insBox);
      }

      // 캠페인별 성과 (스프레드시트 형태)
      const agg = {};
      filtered.forEach(r => {
        const key = (r.platform || '?') + ' | ' + (r.utm_source || '?') + ' | ' + (r.utm_campaign || '?');
        if (!agg[key]) agg[key] = { platform: r.platform, source: r.utm_source, campaign: r.utm_campaign,
          spend:0, imp:0, clicks:0, acquired:0, purchases:0, revenue:0 };
        agg[key].spend += parseFloat(r.spend_krw) || 0;
        agg[key].imp += parseFloat(r.impressions) || 0;
        agg[key].clicks += parseFloat(r.clicks) || 0;
        agg[key].acquired += parseFloat(r.acquired_users) || 0;
        agg[key].purchases += parseFloat(r.purchases) || 0;
        agg[key].revenue += parseFloat(r.ga_revenue) || 0;
      });
      const camList = Object.values(agg).map(a => ({
        ...a,
        ctr: a.imp > 0 ? a.clicks/a.imp*100 : NaN,
        cpc: a.clicks > 0 ? a.spend/a.clicks : NaN,
        cac: a.acquired > 0 ? a.spend/a.acquired : NaN,
        roas: a.spend > 0 ? a.revenue/a.spend : NaN,
        ltv: a.acquired > 0 ? a.revenue/a.acquired : NaN,
        ltv_cac: (a.acquired > 0 && a.spend > 0) ? (a.revenue/a.acquired)/(a.spend/a.acquired) : NaN
      })).sort((a,b) => (b.revenue||0) - (a.revenue||0));

      const camBox = document.createElement('div');
      camBox.className = 'chart-box';
      let cht = '<h3>캠페인별 성과</h3><div class="h3-sub">플랫폼 · 소스 · 캠페인 조합별 상세 지표 (매출 기준 내림차순)</div>' +
        '<div style="overflow-x:auto"><table class="drill-table"><thead><tr>' +
        '<th>플랫폼 / 소스 / 캠페인</th><th>광고비</th><th>노출</th><th>클릭</th><th>CTR</th><th>CPC</th>' +
        '<th>획득</th><th>CAC</th><th>구매</th><th>매출</th><th>ROAS</th><th>LTV/CAC</th>' +
        '</tr></thead><tbody>';
      camList.slice(0, 50).forEach(r => {
        const roasCls = toneClass('roas', r.roas);
        const lcCls = toneClass('ltv_cac', r.ltv_cac);
        cht += '<tr>' +
          '<td><b>' + (r.platform || '-') + '</b> / ' + (r.source || '-') + ' / ' + (r.campaign || '-') + '</td>' +
          '<td>' + (r.spend > 0 ? fmt(r.spend) : '-') + '</td>' +
          '<td>' + (r.imp > 0 ? fmt(r.imp) : '-') + '</td>' +
          '<td>' + (r.clicks > 0 ? fmt(r.clicks) : '-') + '</td>' +
          '<td>' + (isFinite(r.ctr) ? r.ctr.toFixed(2) + '%' : '-') + '</td>' +
          '<td>' + (isFinite(r.cpc) ? fmt(r.cpc) : '-') + '</td>' +
          '<td>' + (r.acquired > 0 ? fmt(r.acquired) : '-') + '</td>' +
          '<td>' + (isFinite(r.cac) ? fmt(r.cac) : '-') + '</td>' +
          '<td>' + (r.purchases > 0 ? fmt(r.purchases) : '-') + '</td>' +
          '<td class="val-highlight">' + (r.revenue > 0 ? fmt(r.revenue) : '-') + '</td>' +
          '<td class="' + roasCls + '" style="font-weight:700">' + (isFinite(r.roas) ? r.roas.toFixed(2) + 'x' : '-') + '</td>' +
          '<td class="' + lcCls + '" style="font-weight:700">' + (isFinite(r.ltv_cac) ? r.ltv_cac.toFixed(2) : '-') + '</td>' +
          '</tr>';
      });
      cht += '</tbody></table></div>';
      camBox.innerHTML = cht;
      content.appendChild(camBox);
    }
    draw();
  } catch(e) { statusEl.textContent = '⚠️ ' + e.message; }
}
</script>
</body></html>
