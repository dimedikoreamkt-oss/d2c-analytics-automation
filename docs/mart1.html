<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 1 · 일별 이커머스 KPI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #0f1115; color: #e8e8ea; padding: 32px 20px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  a.back { color: #4f8cff; text-decoration: none; font-size: 14px; }
  h1 { margin: 8px 0 4px; font-size: 24px; }
  p.sub { color: #9a9aa5; margin-top: 0; }
  .kpi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; margin: 24px 0 32px;
  }
  .kpi-card {
    background: #1a1d24; border: 1px solid #2a2d36; border-radius: 12px; padding: 16px;
  }
  .kpi-card .label { font-size: 12px; color: #9a9aa5; text-transform: uppercase; }
  .kpi-card .value { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .chart-box {
    background: #1a1d24; border: 1px solid #2a2d36; border-radius: 14px;
    padding: 20px; margin-bottom: 24px;
  }
  .chart-box h3 { margin-top: 0; font-size: 15px; color: #cfd2da; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid #2a2d36; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  #status { color: #9a9aa5; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; 대시보드 목록</a>
  <h1>Mart 1 · 일별 이커머스 핵심 KPI</h1>
  <p class="sub" id="status">데이터 불러오는 중...</p>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div id="chartsArea"></div>

  <div class="chart-box">
    <h3>원본 데이터 (최근 90일)</h3>
    <div style="overflow-x:auto">
      <table id="dataTable"></table>
    </div>
  </div>
</div>

<script>
async function loadData() {
  const statusEl = document.getElementById('status');
  try {
    const res = await fetch('data/mart1_daily_kpi.json?t=' + Date.now());
    if (!res.ok) throw new Error('데이터 파일을 찾을 수 없음');
    const rows = await res.json();
    if (!rows || rows.length === 0) {
      statusEl.textContent = '아직 데이터가 없습니다. GitHub Actions가 최소 1회 실행된 후 표시됩니다.';
      return;
    }
    render(rows);
    statusEl.textContent = `총 ${rows.length}일치 데이터 · 마지막 업데이트: ${rows[rows.length-1].event_date || '-'}`;
  } catch (e) {
    statusEl.textContent = '⚠️ 데이터 로드 실패: ' + e.message;
  }
}

function render(rows) {
  const keys = Object.keys(rows[0]);
  const dateKey = keys.find(k => k.toLowerCase().includes('date')) || keys[0];
  const numericKeys = keys.filter(k => k !== dateKey && typeof rows[0][k] !== 'object' && !isNaN(parseFloat(rows[0][k])));

  // KPI 카드: 마지막 날짜 기준 값
  const latest = rows[rows.length - 1];
  const kpiGrid = document.getElementById('kpiGrid');
  numericKeys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'kpi-card';
    const val = parseFloat(latest[k]);
    div.innerHTML = `<div class="label">${k}</div><div class="value">${isNaN(val) ? latest[k] : val.toLocaleString()}</div>`;
    kpiGrid.appendChild(div);
  });

  // 라인 차트: 숫자 컬럼별로 하나씩
  const chartsArea = document.getElementById('chartsArea');
  numericKeys.forEach(k => {
    const box = document.createElement('div');
    box.className = 'chart-box';
    box.innerHTML = `<h3>${k} 추이</h3><canvas></canvas>`;
    chartsArea.appendChild(box);
    const ctx = box.querySelector('canvas').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: rows.map(r => r[dateKey]),
        datasets: [{
          label: k,
          data: rows.map(r => parseFloat(r[k])),
          borderColor: '#4f8cff',
          backgroundColor: 'rgba(79,140,255,0.12)',
          tension: 0.3,
          fill: true,
          pointRadius: 2
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#9a9aa5' }, grid: { color: '#242830' } },
          y: { ticks: { color: '#9a9aa5' }, grid: { color: '#242830' } }
        }
      }
    });
  });

  // 테이블
  const table = document.getElementById('dataTable');
  const thead = '<thead><tr>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead>';
  const tbody = '<tbody>' + rows.slice().reverse().map(r =>
    '<tr>' + keys.map(k => `<td>${r[k]}</td>`).join('') + '</tr>'
  ).join('') + '</tbody>';
  table.innerHTML = thead + tbody;
}

loadData();
</script>
</body>
</html>
