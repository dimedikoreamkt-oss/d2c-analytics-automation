<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mart 21 · 소재 피로도 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mart_common.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body{font-family:'Inter','Noto Sans KR',sans-serif;background:#f5f7fa;margin:0;color:#111;}
  .topbar{background:#fff;padding:14px 24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid #e5e7eb;}
  .topbar .logo{font-weight:700;color:#111;text-decoration:none;font-size:16px;display:flex;align-items:center;gap:8px;}
  .topbar .logo-mark{background:#2563eb;color:#fff;width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
  .wrap{max-width:1400px;margin:0 auto;padding:24px;}
  h1{margin:0 0 6px;font-size:26px;font-weight:700;}
  .desc{color:#6b7280;font-size:14px;margin:0 0 20px;}

  .grade-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
  .grade-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;text-align:center;position:relative;}
  .grade-card.CRITICAL{background:linear-gradient(135deg,#fef2f2,#fff);border-color:#ef4444;}
  .grade-card.HIGH{background:linear-gradient(135deg,#fff7ed,#fff);border-color:#f97316;}
  .grade-card.MEDIUM{background:linear-gradient(135deg,#fefce8,#fff);border-color:#eab308;}
  .grade-card.LOW{background:linear-gradient(135deg,#eff6ff,#fff);border-color:#3b82f6;}
  .grade-card.HEALTHY{background:linear-gradient(135deg,#f0fdf4,#fff);border-color:#10b981;}
  .grade-card .emoji{font-size:28px;}
  .grade-card .count{font-size:24px;font-weight:700;margin:4px 0;}
  .grade-card .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
  .grade-card .spend{font-size:11px;color:#374151;margin-top:6px;font-weight:600;}

  .insight-box{background:linear-gradient(135deg,#fef2f2,#fff7ed);border-left:4px solid #ef4444;padding:16px 20px;border-radius:8px;margin-bottom:20px;}
  .insight-box h3{margin:0 0 8px;font-size:14px;color:#991b1b;}
  .insight-box ul{margin:0;padding-left:20px;font-size:13px;line-height:1.8;color:#374151;}

  .controls{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .controls select,.controls input{padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;}

  .fatigue-table{width:100%;background:#fff;border-radius:12px;border:1px solid #e5e7eb;border-collapse:separate;border-spacing:0;overflow:hidden;font-size:12px;}
  .fatigue-table th{background:#f9fafb;padding:10px 8px;text-align:right;font-size:10px;color:#6b7280;text-transform:uppercase;border-bottom:1px solid #e5e7eb;font-weight:600;}
  .fatigue-table th:first-child,.fatigue-table td:first-child{text-align:left;padding-left:16px;min-width:250px;}
  .fatigue-table td{padding:12px 8px;text-align:right;border-bottom:1px solid #f3f4f6;font-weight:600;cursor:pointer;}
  .fatigue-table tr:hover td{background:#f9fafb;}
  .fatigue-table tr.CRITICAL td:first-child{border-left:4px solid #ef4444;}
  .fatigue-table tr.HIGH td:first-child{border-left:4px solid #f97316;}
  .fatigue-table tr.MEDIUM td:first-child{border-left:4px solid #eab308;}
  .fatigue-table tr.LOW td:first-child{border-left:4px solid #3b82f6;}
  .fatigue-table tr.HEALTHY td:first-child{border-left:4px solid #10b981;}
  .fatigue-score-bar{display:inline-block;width:80px;height:20px;background:#e5e7eb;border-radius:10px;overflow:hidden;position:relative;vertical-align:middle;margin-right:6px;}
  .fatigue-score-fill{height:100%;background:linear-gradient(90deg,#10b981,#eab308,#f97316,#ef4444);}
  .thumb-small{width:40px;height:40px;object-fit:cover;border-radius:5px;vertical-align:middle;margin-right:8px;}
  .grade-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px;}
  .grade-tag.CRITICAL{background:#ef4444;color:#fff;}
  .grade-tag.HIGH{background:#f97316;color:#fff;}
  .grade-tag.MEDIUM{background:#eab308;color:#fff;}
  .grade-tag.LOW{background:#3b82f6;color:#fff;}
  .grade-tag.HEALTHY{background:#10b981;color:#fff;}
  .grade-tag.NO_SPEND{background:#9ca3af;color:#fff;}
  .signal-badge{display:inline-block;font-size:14px;margin:0 2px;}
  .signal-badge.on{opacity:1;}
  .signal-badge.off{opacity:0.15;}
  .up{color:#dc2626;}
  .down{color:#059669;}
  .chart-box{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-top:20px;}
  .chart-box h3{margin:0 0 14px;font-size:15px;font-weight:700;}
</style>
  <script src="mart_common.js"></script>
</head>
<body>
  <aside class="sidebar"></aside>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
</header>
<div class="wrap">
  <h1>🔥 Mart 21 · 소재 피로도 대시보드</h1>
  <p class="desc">러닝 기간·빈도·CTR/CPC/CPM 트렌드 기반 종합 점수화 · 언제 어떤 소재를 교체해야 하는지 자동 판정</p>

  <div id="content">데이터 로딩 중...</div>
</div>
<script>
let DATA=[];

async function load(){
  try{
    const res=await fetch('data/mart21_fatigue.json?t='+Date.now());
    if(!res.ok) throw new Error('데이터 없음 - 워크플로 실행 후 재시도 필요');
    DATA=await res.json();
    if(!DATA.length){document.getElementById('content').innerHTML='<div style="background:#fff;padding:40px;text-align:center;border-radius:12px;color:#9ca3af;">아직 피로도 데이터가 없습니다.</div>';return;}
    render();
  }catch(e){
    document.getElementById('content').innerHTML='<div style="background:#fff;padding:40px;text-align:center;border-radius:12px;color:#ef4444;">⚠️ '+e.message+'</div>';
  }
}

function fmt(n,d=0){if(n==null||isNaN(n))return'-';return Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});}
function pctFmt(n){if(n==null||isNaN(n))return'-';const v=+n;return`${v>0?'+':''}${v.toFixed(1)}%`;}

function gradeKey(g){
  if(!g) return 'HEALTHY';
  if(g.includes('CRITICAL')) return 'CRITICAL';
  if(g.includes('HIGH')) return 'HIGH';
  if(g.includes('MEDIUM')) return 'MEDIUM';
  if(g.includes('LOW')) return 'LOW';
  if(g.includes('NO_SPEND')) return 'NO_SPEND';
  if(g.includes('부족')) return 'NO_SPEND';
  return 'HEALTHY';
}

function generateInsights(){
  const items=[];
  const critical=DATA.filter(r=>gradeKey(r.fatigue_grade)==='CRITICAL');
  const high=DATA.filter(r=>gradeKey(r.fatigue_grade)==='HIGH');
  const healthy=DATA.filter(r=>gradeKey(r.fatigue_grade)==='HEALTHY');
  const totalSpendCritical=critical.reduce((s,r)=>s+(+r.life_spend||0),0);
  const r7SpendCritical=critical.reduce((s,r)=>s+(+r.r7_spend||0),0);

  if(critical.length){
    items.push(`🚨 <b>즉시 교체 필요 소재 ${critical.length}개</b> — 누적 지출 ₩${fmt(totalSpendCritical)}, 최근 7일 ${fmt(r7SpendCritical)}원 지출 중 → 즉시 정지 시 예산 절감 가능`);
    const top3=critical.sort((a,b)=>(+b.fatigue_score)-(+a.fatigue_score)).slice(0,3);
    items.push(`🔥 가장 심각한 소재: ${top3.map(r=>`"${r.ad_name}" (점수 ${r.fatigue_score})`).join(', ')}`);
  }

  if(high.length){
    const highSpend7=high.reduce((s,r)=>s+(+r.r7_spend||0),0);
    items.push(`⚠️ 위험 단계 소재 ${high.length}개 · 최근 7일 지출 ₩${fmt(highSpend7)} — 신규 소재 준비 즉시 시작 권장`);
  }

  // CTR 크게 떨어진 소재
  const bigCtrDrop=DATA.filter(r=>r.ctr_change_pct!=null && +r.ctr_change_pct<=-40 && +r.r7_spend>50000)
    .sort((a,b)=>(+a.ctr_change_pct)-(+b.ctr_change_pct)).slice(0,3);
  if(bigCtrDrop.length){
    items.push(`📉 CTR 급락 TOP3: ${bigCtrDrop.map(r=>`"${r.ad_name}" (${pctFmt(r.ctr_change_pct)})`).join(', ')}`);
  }

  // CPC 급등
  const bigCpcRise=DATA.filter(r=>r.cpc_change_pct!=null && +r.cpc_change_pct>=50 && +r.r7_spend>50000)
    .sort((a,b)=>(+b.cpc_change_pct)-(+a.cpc_change_pct)).slice(0,3);
  if(bigCpcRise.length){
    items.push(`💸 CPC 급등 TOP3: ${bigCpcRise.map(r=>`"${r.ad_name}" (${pctFmt(r.cpc_change_pct)})`).join(', ')} — 오디언스 소진 신호`);
  }

  if(healthy.length && !critical.length){
    items.push(`✅ 건강 소재 ${healthy.length}개 유지 중 — 즉각적 교체 압박 없음`);
  }

  if(!items.length){
    items.push('현재 판정 가능한 피로 소재가 없습니다. 소재별 지출·러닝 기간 축적 후 재분석.');
  }
  return items;
}

function render(){
  const grades=['CRITICAL','HIGH','MEDIUM','LOW','HEALTHY','NO_SPEND'];
  const gradeInfo={
    CRITICAL:{emoji:'🚨',label:'즉시교체'},
    HIGH:{emoji:'⚠️',label:'위험'},
    MEDIUM:{emoji:'🟡',label:'주의'},
    LOW:{emoji:'🔵',label:'관찰'},
    HEALTHY:{emoji:'✅',label:'건강'},
    NO_SPEND:{emoji:'💤',label:'휴면/부족'}
  };
  const counts={},spends={};
  grades.forEach(g=>{counts[g]=0;spends[g]=0;});
  DATA.forEach(r=>{
    const g=gradeKey(r.fatigue_grade);
    counts[g]++;
    spends[g]+=(+r.r7_spend||0);
  });

  let html=`
    <div class="grade-summary">
      ${grades.map(g=>`
        <div class="grade-card ${g}">
          <div class="emoji">${gradeInfo[g].emoji}</div>
          <div class="count">${counts[g]}</div>
          <div class="label">${gradeInfo[g].label}</div>
          <div class="spend">₩${fmt(spends[g])}<br><span style="color:#9ca3af;font-weight:400;font-size:10px;">최근 7일</span></div>
        </div>
      `).join('')}
    </div>

    <div class="insight-box">
      <h3>🎯 즉시 액션 인사이트</h3>
      <ul>${generateInsights().map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>

    <div class="controls">
      <label style="font-size:12px;color:#6b7280;font-weight:600;">등급 필터</label>
      <select id="gradeFilter">
        <option value="">전체</option>
        <option value="CRITICAL">🚨 즉시교체</option>
        <option value="HIGH">⚠️ 위험</option>
        <option value="MEDIUM">🟡 주의</option>
        <option value="LOW">🔵 관찰</option>
        <option value="HEALTHY">✅ 건강</option>
      </select>
      <label style="font-size:12px;color:#6b7280;font-weight:600;">정렬</label>
      <select id="sortBy">
        <option value="fatigue_score">피로도 점수순</option>
        <option value="r7_spend">최근 지출순</option>
        <option value="running_days">러닝 기간순</option>
        <option value="r7_freq">빈도순</option>
        <option value="ctr_change_pct">CTR 하락순</option>
      </select>
      <input type="text" id="searchName" placeholder="소재명 검색..." style="flex:1;">
    </div>

    <div id="tableWrap"></div>

    <div class="chart-box">
      <h3>📊 피로도 점수 분포</h3>
      <canvas id="distChart" height="70"></canvas>
    </div>

    <div class="chart-box">
      <h3>🔻 CTR 변화율 (첫 7일 → 최근 7일)</h3>
      <canvas id="ctrChangeChart" height="70"></canvas>
    </div>
  `;
  document.getElementById('content').innerHTML=html;

  bindControls();
  renderTable();
  drawCharts();
}

function renderTable(){
  const gradeF=document.getElementById('gradeFilter').value;
  const sortBy=document.getElementById('sortBy').value;
  const search=document.getElementById('searchName').value.toLowerCase();

  let list=DATA.filter(r=>{
    if(gradeF && gradeKey(r.fatigue_grade)!==gradeF) return false;
    if(search && !(r.ad_name||'').toLowerCase().includes(search)) return false;
    return true;
  });

  const dir=sortBy==='ctr_change_pct'?1:-1;
  list.sort((a,b)=>((+a[sortBy]||0)-(+b[sortBy]||0))*dir);

  const html=`
    <table class="fatigue-table">
      <thead><tr>
        <th>소재</th><th>등급</th><th>피로도</th><th>시그널</th>
        <th>러닝일수</th><th>빈도</th><th>CTR (첫7 → 최근7)</th><th>CPC 변화</th><th>CPM 변화</th>
        <th>최근 7일 지출</th><th>누적 지출</th><th>누적 매출</th><th>ROAS</th>
      </tr></thead>
      <tbody>
        ${list.map(r=>{
          const g=gradeKey(r.fatigue_grade);
          const sigs=[
            {on:+r.sig_high_freq,icon:'🔥',t:'빈도3+'},
            {on:+r.sig_ctr_decline,icon:'📉',t:'CTR↓'},
            {on:+r.sig_cpc_rise,icon:'💸',t:'CPC↑'},
            {on:+r.sig_cpm_rise,icon:'🌡',t:'CPM↑'},
            {on:+r.sig_long_running,icon:'⏱',t:'롱런'}
          ];
          return `<tr class="${g}" onclick="window.location.href='creative_detail.html?ad_id=${encodeURIComponent(r.ad_id)}'">
            <td>${r.ad_name}<span class="grade-tag ${g}">${r.fatigue_grade}</span><br><span style="font-size:10px;color:#9ca3af;font-weight:400;">${r.campaign_name} · ${r.adset_name}</span></td>
            <td><span class="grade-tag ${g}">${r.fatigue_grade}</span></td>
            <td><div class="fatigue-score-bar"><div class="fatigue-score-fill" style="width:${r.fatigue_score||0}%;"></div></div>${r.fatigue_score||0}</td>
            <td>${sigs.map(s=>`<span class="signal-badge ${s.on?'on':'off'}" title="${s.t}">${s.icon}</span>`).join('')}</td>
            <td>${r.running_days||0}일</td>
            <td>${fmt(r.r7_freq,2)}</td>
            <td>${fmt(r.f7_ctr,2)}% → ${fmt(r.r7_ctr,2)}%<br><span class="${+r.ctr_change_pct<0?'down':'up'}" style="font-size:10px;">${pctFmt(r.ctr_change_pct)}</span></td>
            <td class="${+r.cpc_change_pct>0?'up':'down'}">${pctFmt(r.cpc_change_pct)}</td>
            <td class="${+r.cpm_change_pct>0?'up':'down'}">${pctFmt(r.cpm_change_pct)}</td>
            <td>₩${fmt(r.r7_spend||0)}</td>
            <td>₩${fmt(r.life_spend||0)}</td>
            <td>₩${fmt(r.life_revenue||0)}</td>
            <td>${fmt(r.life_ga_roas,2)}x</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="margin-top:10px;font-size:11px;color:#6b7280;">
      🔥 빈도 3+ | 📉 CTR 25%↓ | 💸 CPC 30%↑ | 🌡 CPM 25%↑ | ⏱ 롱런(30일+) · 아이콘 색상: 진하면 활성, 흐리면 비활성
    </div>
  `;
  document.getElementById('tableWrap').innerHTML=html;
}

function bindControls(){
  ['gradeFilter','sortBy','searchName'].forEach(id=>{
    document.getElementById(id).addEventListener('input',renderTable);
    document.getElementById(id).addEventListener('change',renderTable);
  });
}

function drawCharts(){
  const scored=DATA.filter(r=>+r.fatigue_score>0);

  // 분포 차트
  const distCtx=document.getElementById('distChart');
  if(distCtx && scored.length){
    const buckets=[0,20,40,60,80,100];
    const bucketLabels=['0-19','20-39','40-59','60-79','80-100'];
    const bucketCounts=[0,0,0,0,0];
    DATA.forEach(r=>{
      const s=+r.fatigue_score||0;
      if(s<20) bucketCounts[0]++;
      else if(s<40) bucketCounts[1]++;
      else if(s<60) bucketCounts[2]++;
      else if(s<80) bucketCounts[3]++;
      else bucketCounts[4]++;
    });
    new Chart(distCtx,{
      type:'bar',
      data:{
        labels:bucketLabels,
        datasets:[{
          label:'소재 개수',
          data:bucketCounts,
          backgroundColor:['#10b981','#3b82f6','#eab308','#f97316','#ef4444'],
          borderWidth:0
        }]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}
      }
    });
  }

  // CTR 변화율 차트
  const ctrCtx=document.getElementById('ctrChangeChart');
  if(ctrCtx){
    const filtered=DATA.filter(r=>r.ctr_change_pct!=null && +r.life_spend>10000)
      .sort((a,b)=>(+a.ctr_change_pct)-(+b.ctr_change_pct)).slice(0,15);
    new Chart(ctrCtx,{
      type:'bar',
      data:{
        labels:filtered.map(r=>(r.ad_name||'').slice(0,25)),
        datasets:[{
          label:'CTR 변화율 (%)',
          data:filtered.map(r=>+r.ctr_change_pct),
          backgroundColor:filtered.map(r=>+r.ctr_change_pct<0?'#ef4444':'#10b981'),
          borderWidth:0
        }]
      },
      options:{
        indexAxis:'y',
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{x:{title:{display:true,text:'CTR 변화율 (%)'}}}
      }
    });
  }
}

load();
</script>
</body>
</html>
