<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소재 상세 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mart_common.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body{font-family:'Inter','Noto Sans KR',sans-serif;background:#f5f7fa;margin:0;color:#111;}
  .topbar{background:#fff;padding:14px 24px;display:flex;align-items:center;gap:20px;border-bottom:1px solid #e5e7eb;}
  .topbar .logo{font-weight:700;color:#111;text-decoration:none;font-size:16px;display:flex;align-items:center;gap:8px;}
  .topbar .logo-mark{background:#2563eb;color:#fff;width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
  .topbar nav a{color:#6b7280;text-decoration:none;font-size:13px;}
  .wrap{max-width:1400px;margin:0 auto;padding:24px;}
  .breadcrumb{font-size:13px;color:#6b7280;margin-bottom:8px;}
  .breadcrumb a{color:#2563eb;text-decoration:none;}
  h1{margin:0 0 4px;font-size:24px;font-weight:700;}
  .subtitle{color:#6b7280;font-size:13px;margin-bottom:18px;}
  .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:8px;vertical-align:middle;}
  .status-ACTIVE{background:#d1fae5;color:#065f46;}
  .status-PAUSED{background:#fef3c7;color:#92400e;}
  .status-ARCHIVED,.status-CAMPAIGN_PAUSED,.status-ADSET_PAUSED{background:#e5e7eb;color:#4b5563;}

  .date-control{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-bottom:20px;}
  .date-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .date-row:last-child{margin-bottom:0;}
  .date-row label{font-size:12px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
  .date-row select,.date-row input[type=date]{padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;background:#fff;font-family:inherit;}
  .date-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;}
  .date-row .compare-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;color:#2563eb;}
  .date-row .apply-btn{padding:7px 20px;background:#2563eb;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;}
  .date-row .apply-btn:hover{background:#1d4ed8;}
  .compare-row{display:none;padding-top:10px;border-top:1px dashed #e5e7eb;margin-top:10px;}
  .compare-row.show{display:flex;}
  .period-label{background:#eff6ff;color:#1e40af;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}

  .detail-layout{display:grid;grid-template-columns:340px 1fr;gap:24px;}
  @media(max-width:960px){.detail-layout{grid-template-columns:1fr;}}
  .creative-preview{position:sticky;top:20px;align-self:start;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;}
  .creative-preview img{width:100%;border-radius:8px;}
  .copy-block{background:#f9fafb;border-radius:6px;padding:10px 12px;margin-top:8px;font-size:12px;line-height:1.5;}
  .copy-block strong{display:block;color:#6b7280;font-size:10px;text-transform:uppercase;margin-bottom:2px;letter-spacing:0.5px;}

  .kpi-section{margin-bottom:24px;}
  .kpi-section-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #2563eb;display:inline-block;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .kpi-box{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px;position:relative;}
  .kpi-box-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;}
  .kpi-box-value{font-size:20px;font-weight:700;line-height:1.2;}
  .kpi-box-value.good{color:#059669;}
  .kpi-box-value.bad{color:#dc2626;}
  .kpi-box-hint{font-size:10px;color:#6b7280;margin-top:4px;}
  .kpi-box-delta{font-size:11px;font-weight:700;margin-top:4px;display:inline-block;padding:1px 6px;border-radius:4px;}
  .delta-up{background:#d1fae5;color:#065f46;}
  .delta-down{background:#fee2e2;color:#991b1b;}
  .delta-neutral{background:#f3f4f6;color:#6b7280;}
  .kpi-box-prev{font-size:10px;color:#9ca3af;margin-top:2px;}

  .funnel-mini{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .funnel-step{flex:1;min-width:100px;background:#eff6ff;border-radius:6px;padding:8px;text-align:center;font-size:11px;}
  .funnel-arrow{color:#9ca3af;font-size:16px;}
  .chart-box{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-top:16px;}

  /* 인구통계 매트릭스 */
  .demo-tabs{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;}
  .demo-tab{padding:6px 12px;border-radius:6px;background:#f3f4f6;font-size:12px;font-weight:600;color:#4b5563;cursor:pointer;border:1px solid #e5e7eb;}
  .demo-tab.active{background:#2563eb;color:#fff;border-color:#2563eb;}
  .demo-matrix{width:100%;border-collapse:separate;border-spacing:3px;margin-top:12px;font-size:12px;}
  .demo-matrix th{padding:8px;background:#f9fafb;color:#6b7280;font-weight:600;text-align:center;}
  .demo-matrix td{padding:12px 8px;text-align:center;color:#fff;font-weight:700;border-radius:4px;font-size:13px;}
  .demo-matrix td.header{background:#f3f4f6;color:#374151;}
  .demo-matrix td.empty{background:#f9fafb;color:#d1d5db;}

  /* 지역/게재위치 랭킹 */
  .rank-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .rank-item{display:flex;align-items:center;padding:10px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;}
  .rank-item .rank-num{font-weight:700;color:#9ca3af;width:24px;text-align:center;font-family:monospace;}
  .rank-item .rank-name{flex:1;font-weight:600;margin-left:8px;}
  .rank-item .rank-bar-wrap{flex:2;height:8px;background:#f3f4f6;border-radius:4px;margin:0 12px;overflow:hidden;}
  .rank-item .rank-bar{height:100%;background:linear-gradient(90deg,#2563eb,#4d94ff);border-radius:4px;}
  .rank-item .rank-metric{font-size:12px;color:#6b7280;font-weight:600;min-width:120px;text-align:right;}
  .rank-item .rank-badge{background:#d1fae5;color:#065f46;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px;}
  .rank-item .rank-badge.bad{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo"><span class="logo-mark">D</span>D2C Analytics</a>
  <nav><a href="creative_gallery.html">← 소재 갤러리</a></nav>
</header>

<div class="wrap">
  <div id="detailRoot">데이터 로딩 중...</div>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const AD_ID=params.get('ad_id');
let CREATIVE=null, PERF=[], DEMO=[], PLATFORM=[], REGION=[];

let periodStart=null, periodEnd=null;
let compareEnabled=false, compareStart=null, compareEnd=null;
let demoMetric='impressions'; // 인구통계 표시 지표

async function load(){
  try{
    const [c,p,d,pf,rg]=await Promise.all([
      fetch('data/meta_creatives.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/mart19_creatives.json?t='+Date.now()).then(r=>r.json()),
      fetch('data/mart22_creative_demographics.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch('data/mart23_creative_platform.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch('data/mart24_creative_region.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);
    CREATIVE=c.find(x=>x.ad_id===AD_ID);
    PERF=p.filter(x=>x.ad_id===AD_ID).sort((a,b)=>a.event_date.localeCompare(b.event_date));
    DEMO=d.filter(x=>x.ad_id===AD_ID);
    PLATFORM=pf.filter(x=>x.ad_id===AD_ID);
    REGION=rg.filter(x=>x.ad_id===AD_ID);

    if(!CREATIVE){document.getElementById('detailRoot').innerHTML='<h2>소재를 찾을 수 없습니다.</h2>';return;}

    const maxDate=PERF.length?PERF[PERF.length-1].event_date:new Date().toISOString().slice(0,10);
    const minDate=PERF.length?PERF[0].event_date:maxDate;
    periodEnd=maxDate;
    const s=new Date(maxDate);s.setDate(s.getDate()-6);
    periodStart=s.toISOString().slice(0,10);
    if(periodStart<minDate) periodStart=minDate;
    setCompareAuto();

    render();
    bindControls();
  }catch(e){
    document.getElementById('detailRoot').innerHTML='<h2>⚠️ 데이터 로드 실패: '+e.message+'</h2>';
  }
}

function setCompareAuto(){
  const s=new Date(periodStart), e=new Date(periodEnd);
  const days=Math.round((e-s)/86400000)+1;
  const ce=new Date(s); ce.setDate(ce.getDate()-1);
  const cs=new Date(ce); cs.setDate(cs.getDate()-(days-1));
  compareStart=cs.toISOString().slice(0,10);
  compareEnd=ce.toISOString().slice(0,10);
}

function fmt(n,d=0){if(n==null||isNaN(n))return'-';return Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});}
function inRange(date,s,e){return date>=s&&date<=e;}

function aggregate(start,end){
  const rows=PERF.filter(r=>inRange(r.event_date,start,end));
  if(!rows.length) return null;
  const sum=(k)=>rows.reduce((s,r)=>s+(+r[k]||0),0);
  const totalImp=sum('impressions');
  const totalSpend=sum('spend_krw');
  const totalClicks=sum('clicks');
  const totalLinkClicks=sum('link_clicks');
  const metaValue=sum('meta_purchase_value');
  const gaRevenue=sum('ga_revenue');
  const gaSessions=sum('ga_sessions');
  const gaPurchases=sum('ga_purchases');
  const weightedFreq=totalImp?rows.reduce((s,r)=>s+(+r.frequency||0)*(+r.impressions||0),0)/totalImp:0;

  return {
    days:rows.length, spend:totalSpend, impressions:totalImp, reach:sum('reach'), frequency:weightedFreq,
    clicks:totalClicks, linkClicks:totalLinkClicks,
    ctr:totalImp?totalClicks/totalImp*100:0, linkCtr:totalImp?totalLinkClicks/totalImp*100:0,
    cpc:totalClicks?totalSpend/totalClicks:0, cpm:totalImp?totalSpend/totalImp*1000:0,
    metaPurchases:sum('meta_purchases'), metaValue:metaValue,
    metaRoas:totalSpend?metaValue/totalSpend:0, metaAtc:sum('meta_add_to_cart'),
    gaSessions:gaSessions, gaUsers:sum('ga_users'), gaPDP:sum('ga_pdp_views'),
    gaATC:sum('ga_add_to_cart'), gaLogins:sum('ga_logins'), gaSignups:sum('ga_signups'),
    gaCheckouts:sum('ga_checkouts'), gaPurchases:gaPurchases, gaRevenue:gaRevenue,
    gaRoas:totalSpend?gaRevenue/totalSpend:0, gaCvr:gaSessions?gaPurchases/gaSessions*100:0,
    gaCac:gaPurchases?totalSpend/gaPurchases:null,
    avgEng:rows.length?rows.reduce((s,r)=>s+(+r.ga_avg_engagement_sec||0),0)/rows.length:0,
    avgScroll:rows.length?rows.reduce((s,r)=>s+(+r.ga_avg_scroll_depth_pct||0),0)/rows.length:0,
    videoP25:sum('video_p25'), videoP50:sum('video_p50'), videoP75:sum('video_p75'), videoP100:sum('video_p100')
  };
}

function delta(current,previous){
  if(previous==null||current==null) return null;
  if(previous===0){return current===0?{pct:0,dir:'neutral'}:{pct:null,dir:'up',special:'신규'};}
  const pct=(current-previous)/previous*100;
  return {pct,dir:pct>0.5?'up':pct<-0.5?'down':'neutral'};
}

function deltaHTML(cur,prev,goodDir='up',unit='',digit=0){
  if(!compareEnabled||prev==null) return '';
  const d=delta(cur,prev);
  if(!d) return '';
  const cls='delta-'+d.dir;
  const arrow=d.dir==='up'?'▲':d.dir==='down'?'▼':'─';
  const better=(d.dir==='up'&&goodDir==='up')||(d.dir==='down'&&goodDir==='down');
  const txt=d.special||(d.pct!=null?`${d.pct>0?'+':''}${d.pct.toFixed(1)}%`:'-');
  return `<div class="kpi-box-delta ${cls}" title="${better?'개선':'악화'}">${arrow} ${txt}</div>
          <div class="kpi-box-prev">이전: ${prev===null?'-':unit+fmt(prev,digit)+(unit==='%'?'':'')}</div>`;
}

// ========== 인구통계 매트릭스 ==========
function buildDemographicsHTML(){
  const rows=DEMO.filter(r=>inRange(r.event_date,periodStart,periodEnd));
  if(!rows.length) return '<div style="padding:20px;background:#f9fafb;border-radius:8px;color:#9ca3af;text-align:center;font-size:12px;">인구통계 데이터 없음</div>';

  const AGES=['18-24','25-34','35-44','45-54','55-64','65+'];
  const GENDERS=['female','male','unknown'];
  const GEN_LABEL={female:'여성',male:'남성',unknown:'미상'};

  const matrix={};
  AGES.forEach(a=>{matrix[a]={};GENDERS.forEach(g=>matrix[a][g]={imp:0,clk:0,spend:0,purc:0,rev:0});});
  rows.forEach(r=>{
    const a=r.age_bracket,g=r.gender;
    if(!matrix[a]||!matrix[a][g])return;
    matrix[a][g].imp   += +r.impressions||0;
    matrix[a][g].clk   += +r.clicks||0;
    matrix[a][g].spend += +r.spend_krw||0;
    matrix[a][g].purc  += +r.purchases||0;
    matrix[a][g].rev   += +r.revenue||0;
  });

  // 지표별 값 계산
  const getVal=(cell)=>{
    switch(demoMetric){
      case 'impressions': return cell.imp;
      case 'clicks': return cell.clk;
      case 'ctr': return cell.imp?cell.clk/cell.imp*100:0;
      case 'spend': return cell.spend;
      case 'purchases': return cell.purc;
      case 'cvr': return cell.clk?cell.purc/cell.clk*100:0;
      case 'revenue': return cell.rev;
      case 'roas': return cell.spend?cell.rev/cell.spend:0;
      default: return cell.imp;
    }
  };
  const formatVal=(v)=>{
    switch(demoMetric){
      case 'ctr': case 'cvr': return v.toFixed(2)+'%';
      case 'roas': return v.toFixed(2)+'x';
      case 'spend': case 'revenue': return v>=10000?(v/10000).toFixed(0)+'만':fmt(v);
      default: return fmt(v);
    }
  };

  // 최대값 찾기 (색상 스케일)
  let maxVal=0;
  AGES.forEach(a=>GENDERS.forEach(g=>{
    const v=getVal(matrix[a][g]);
    if(v>maxVal) maxVal=v;
  }));

  const color=(v)=>{
    if(!maxVal||!v) return '#f9fafb';
    const ratio=v/maxVal;
    if(ratio<0.05) return '#f3f4f6';
    const alpha=0.15+ratio*0.85;
    return `rgba(37, 99, 235, ${alpha.toFixed(2)})`;
  };

  const metricTabs=[
    ['impressions','노출'],['clicks','클릭'],['ctr','CTR'],
    ['spend','지출'],['purchases','구매'],['cvr','전환율'],
    ['revenue','매출'],['roas','ROAS']
  ];

  // 열 합계
  const colTotal={};
  GENDERS.forEach(g=>{
    colTotal[g]={imp:0,clk:0,spend:0,purc:0,rev:0};
    AGES.forEach(a=>{
      const c=matrix[a][g];
      colTotal[g].imp+=c.imp; colTotal[g].clk+=c.clk;
      colTotal[g].spend+=c.spend; colTotal[g].purc+=c.purc; colTotal[g].rev+=c.rev;
    });
  });
  // 행 합계
  const rowTotal={};
  AGES.forEach(a=>{
    rowTotal[a]={imp:0,clk:0,spend:0,purc:0,rev:0};
    GENDERS.forEach(g=>{
      const c=matrix[a][g];
      rowTotal[a].imp+=c.imp; rowTotal[a].clk+=c.clk;
      rowTotal[a].spend+=c.spend; rowTotal[a].purc+=c.purc; rowTotal[a].rev+=c.rev;
    });
  });

  return `
    <div class="demo-tabs">
      ${metricTabs.map(([k,l])=>`<span class="demo-tab ${demoMetric===k?'active':''}" data-m="${k}">${l}</span>`).join('')}
    </div>
    <table class="demo-matrix">
      <thead>
        <tr>
          <th style="text-align:left;padding-left:14px;">연령대</th>
          ${GENDERS.map(g=>`<th>${GEN_LABEL[g]}</th>`).join('')}
          <th style="background:#eff6ff;color:#1e40af;">합계</th>
        </tr>
      </thead>
      <tbody>
        ${AGES.map(a=>`
          <tr>
            <td class="header" style="text-align:left;padding-left:14px;">${a}</td>
            ${GENDERS.map(g=>{
              const v=getVal(matrix[a][g]);
              if(!v) return '<td class="empty">-</td>';
              return `<td style="background:${color(v)};" title="${a} ${GEN_LABEL[g]}: ${formatVal(v)}">${formatVal(v)}</td>`;
            }).join('')}
            <td style="background:#eff6ff;color:#1e40af;">${formatVal(getVal(rowTotal[a]))}</td>
          </tr>`).join('')}
        <tr>
          <td class="header" style="text-align:left;padding-left:14px;background:#eff6ff;color:#1e40af;">합계</td>
          ${GENDERS.map(g=>`<td style="background:#eff6ff;color:#1e40af;">${formatVal(getVal(colTotal[g]))}</td>`).join('')}
          <td style="background:#dbeafe;color:#1e40af;">${formatVal(AGES.reduce((s,a)=>s+getVal(rowTotal[a]),0)/(demoMetric==='ctr'||demoMetric==='cvr'||demoMetric==='roas'?AGES.length:1))}</td>
        </tr>
      </tbody>
    </table>
    <div style="margin-top:12px;font-size:11px;color:#6b7280;">색상이 진할수록 값이 높음 · 클릭한 지표 기준</div>
  `;
}

// ========== 게재위치 성과 ==========
function buildPlatformHTML(){
  const rows=PLATFORM.filter(r=>inRange(r.event_date,periodStart,periodEnd));
  if(!rows.length) return '<div style="padding:20px;background:#f9fafb;border-radius:8px;color:#9ca3af;text-align:center;font-size:12px;">게재위치 데이터 없음</div>';

  const map={};
  rows.forEach(r=>{
    const k=`${r.publisher_platform||'unknown'} / ${r.platform_position||'unknown'}`;
    if(!map[k]) map[k]={imp:0,clk:0,spend:0,purc:0,rev:0};
    const c=map[k];
    c.imp+=+r.impressions||0; c.clk+=+r.clicks||0;
    c.spend+=+r.spend_krw||0; c.purc+=+r.purchases||0; c.rev+=+r.revenue||0;
  });
  const sorted=Object.entries(map).sort((a,b)=>b[1].imp-a[1].imp);
  const maxImp=sorted[0]?sorted[0][1].imp:1;

  return `
    <div class="rank-list">
      ${sorted.map(([k,v],i)=>{
        const ctr=v.imp?(v.clk/v.imp*100):0;
        const roas=v.spend?(v.rev/v.spend):0;
        const badge=ctr>=3?'<span class="rank-badge">CTR 우수</span>':ctr<1&&v.spend>10000?'<span class="rank-badge bad">CTR 저조</span>':'';
        return `
          <div class="rank-item">
            <span class="rank-num">${i+1}</span>
            <span class="rank-name">${k}${badge}</span>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(v.imp/maxImp*100).toFixed(1)}%;"></div></div>
            <span class="rank-metric">노출 ${fmt(v.imp)} · CTR ${ctr.toFixed(2)}% · ROAS ${roas.toFixed(2)}x</span>
          </div>`;
      }).join('')}
    </div>`;
}

// ========== 지역 성과 ==========
function buildRegionHTML(){
  const rows=REGION.filter(r=>inRange(r.event_date,periodStart,periodEnd));
  if(!rows.length) return '<div style="padding:20px;background:#f9fafb;border-radius:8px;color:#9ca3af;text-align:center;font-size:12px;">지역 데이터 없음</div>';

  const map={};
  rows.forEach(r=>{
    const k=r.region||'unknown';
    if(!map[k]) map[k]={imp:0,clk:0,spend:0,purc:0,rev:0};
    const c=map[k];
    c.imp+=+r.impressions||0; c.clk+=+r.clicks||0;
    c.spend+=+r.spend_krw||0; c.purc+=+r.purchases||0; c.rev+=+r.revenue||0;
  });
  const sorted=Object.entries(map).sort((a,b)=>b[1].spend-a[1].spend).slice(0,15);
  const maxSpend=sorted[0]?sorted[0][1].spend:1;

  return `
    <div class="rank-list">
      ${sorted.map(([k,v],i)=>{
        const roas=v.spend?(v.rev/v.spend):0;
        const cpa=v.purc?v.spend/v.purc:0;
        const badge=roas>=2?'<span class="rank-badge">ROAS 우수</span>':(roas<0.5&&v.spend>10000?'<span class="rank-badge bad">ROAS 저조</span>':'');
        return `
          <div class="rank-item">
            <span class="rank-num">${i+1}</span>
            <span class="rank-name">${k}${badge}</span>
            <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(v.spend/maxSpend*100).toFixed(1)}%;"></div></div>
            <span class="rank-metric">지출 ₩${fmt(v.spend)} · 구매 ${fmt(v.purc)} · ROAS ${roas.toFixed(2)}x</span>
          </div>`;
      }).join('')}
    </div>`;
}

// ========== 개선 제안 ==========
function buildRecommendations(cur){
  const tips=[];
  if(cur.ctr<1.0 && cur.spend>=50000) tips.push({tone:'bad',t:`CTR ${cur.ctr.toFixed(2)}%로 저조 (기준 1%)`,d:'훅(첫 3초) 강화 · 카피 재작성 · 썸네일 A/B 테스트 권장'});
  if(cur.metaRoas<1.0 && cur.spend>=100000) tips.push({tone:'bad',t:`Meta ROAS ${cur.metaRoas.toFixed(2)}x (손실)`,d:'3일 이상 지속되면 일시 정지 검토 · 랜딩 CVR 점검'});
  if(cur.metaRoas>=3.0 && cur.spend>=50000) tips.push({tone:'good',t:`Meta ROAS ${cur.metaRoas.toFixed(2)}x (Winner)`,d:'예산 20~30% 증액 후보 · 유사 소재 확장'});
  if(cur.frequency>=3.0) tips.push({tone:'warn',t:`빈도 ${cur.frequency.toFixed(2)} (피로도 임계)`,d:'동일 유저 반복 노출 · 새 소재 로테이션 필요'});
  if(cur.avgEng<10 && cur.gaSessions>=100) tips.push({tone:'warn',t:`체류시간 ${cur.avgEng.toFixed(1)}초 (즉시 이탈)`,d:'랜딩 페이지 개선 필요 · 헤드라인 or 첫 화면 재검토'});
  if(cur.gaCvr<0.5 && cur.gaSessions>=200) tips.push({tone:'warn',t:`세션 CVR ${cur.gaCvr.toFixed(2)}%`,d:'클릭 후 구매로 못 이어지는 중 · 랜딩 CTA/오퍼 점검'});

  // 인구통계 기반 제안
  const demoRows=DEMO.filter(r=>inRange(r.event_date,periodStart,periodEnd));
  if(demoRows.length){
    const bySeg={};
    demoRows.forEach(r=>{
      const k=`${r.age_bracket} ${r.gender==='female'?'여성':r.gender==='male'?'남성':'미상'}`;
      if(!bySeg[k]) bySeg[k]={spend:0,rev:0,purc:0,clk:0,imp:0};
      bySeg[k].spend+=+r.spend_krw||0;
      bySeg[k].rev+=+r.revenue||0;
      bySeg[k].purc+=+r.purchases||0;
      bySeg[k].clk+=+r.clicks||0;
      bySeg[k].imp+=+r.impressions||0;
    });
    const arr=Object.entries(bySeg).filter(([_,v])=>v.spend>=20000);
    const winners=arr.filter(([_,v])=>v.spend>0 && v.rev/v.spend>=2.0);
    const losers=arr.filter(([_,v])=>v.spend>0 && v.rev===0 && v.spend>=50000);
    if(winners.length){
      const best=winners.sort((a,b)=>(b[1].rev/b[1].spend)-(a[1].rev/a[1].spend))[0];
      tips.push({tone:'good',t:`${best[0]} 세그먼트에서 ROAS ${(best[1].rev/best[1].spend).toFixed(2)}x`,d:'이 세그먼트에 예산 증액 or 유사 오디언스 확장 권장'});
    }
    if(losers.length){
      const worst=losers.sort((a,b)=>b[1].spend-a[1].spend)[0];
      tips.push({tone:'bad',t:`${worst[0]} 세그먼트: 지출 ₩${fmt(worst[1].spend)} but 구매 0`,d:'이 세그먼트 제외 or 광고세트 오디언스 재조정 검토'});
    }
  }

  if(!tips.length) tips.push({tone:'good',t:'전체적으로 안정적 · 특이 이슈 없음',d:'현재 운영 유지 권장'});

  return `
    <div class="rank-list">
      ${tips.map(t=>`
        <div class="rank-item" style="border-left:4px solid ${t.tone==='good'?'#059669':t.tone==='bad'?'#dc2626':'#f59e0b'};">
          <div style="flex:1;">
            <div style="font-weight:700;color:${t.tone==='good'?'#065f46':t.tone==='bad'?'#991b1b':'#92400e'};margin-bottom:2px;">${t.t}</div>
            <div style="font-size:12px;color:#6b7280;">${t.d}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

            ${kpiBox('CPC',`₩${fmt(cur.cpc)}`,cur.cpc,prev?.cpc,'down','₩')}
            ${kpiBox('클릭수',fmt(cur.clicks),cur.clicks,prev?.clicks,'up','')}
            ${kpiBox('CTR (전체)',fmt(cur.ctr,2)+'%',cur.ctr,prev?.ctr,'up','',2,`링크 CTR: ${fmt(cur.linkCtr,2)}%`)}
          </div>
        </div>

        <div class="kpi-section">
          <div class="kpi-section-title">💰 Meta 전환 성과 (Meta 픽셀 어트리뷰션)</div>
          <div class="kpi-grid">
            ${kpiBox('Meta 구매',`${fmt(cur.metaPurchases)}건`,cur.metaPurchases,prev?.metaPurchases,'up','')}
            ${kpiBox('Meta 매출',`₩${fmt(cur.metaValue)}`,cur.metaValue,prev?.metaValue,'up','₩')}
            ${kpiBox('Meta ROAS',fmt(cur.metaRoas,2)+'x',cur.metaRoas,prev?.metaRoas,'up','',2)}
            ${kpiBox('Meta 장바구니',`${fmt(cur.metaAtc)}건`,cur.metaAtc,prev?.metaAtc,'up','')}
          </div>
        </div>

        <div class="kpi-section">
          <div class="kpi-section-title">👥 오디언스 · 연령 × 성별 매트릭스</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">이 소재가 어떤 연령/성별에서 가장 잘 되는지 · 지표 탭 클릭해서 전환</div>
          <div id="demoBlock">${buildDemographicsHTML()}</div>
        </div>

        <div class="kpi-section">
          <div class="kpi-section-title">📍 게재위치 · Placement</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">Facebook / Instagram × Feed / Reels / Story 등 위치별 성과</div>

        </div>

        <div class="kpi-section">
          <div class="kpi-section-title">🗺 지역 성과 · Region</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">지출 기준 상위 15개 지역</div>

        </div>

        <div class="kpi-section">
          <div class="kpi-section-title">🔻 랜딩 후 퍼널 (GA4)</div>
          <div class="funnel-mini">
            <div class="funnel-step"><b>${fmt(cur.gaSessions)}</b><br>세션</div>
            <div class="funnel-arrow">→</div>

            <div class="funnel-arrow">→</div>
            <div class="funnel-step"><b>${fmt(cur.gaATC)}</b><br>장바구니<br><small>${fmt(cur.gaPDP?cur.gaATC/cur.gaPDP*100:0,1)}%</small></div>
            <div class="funnel-arrow">→</div>
            <div class="funnel-step"><b>${fmt(cur.gaCheckouts)}</b><br>결제<br><small>${fmt(cur.gaATC?cur.gaCheckouts/cur.gaATC*100:0,1)}%</small></div>
            <div class="funnel-arrow">→</div>
            <div class="funnel-step"><b>${fmt(cur.gaPurchases)}</b><br>구매<br><small>${fmt(cur.gaCheckouts?cur.gaPurchases/cur.gaCheckouts*100:0,1)}%</small></div>
          </div>
        </div>

        ${cur.videoP25?`
        <div class="kpi-section">
          <div class="kpi-section-title">🎥 영상 시청</div>
          <div class="kpi-grid">
            ${kpiBox('25% 시청',fmt(cur.videoP25),cur.videoP25,prev?.videoP25,'up','')}
            ${kpiBox('50% 시청',fmt(cur.videoP50),cur.videoP50,prev?.videoP50,'up','')}
            ${kpiBox('75% 시청',fmt(cur.videoP75),cur.videoP75,prev?.videoP75,'up','')}
            ${kpiBox('100% 시청',fmt(cur.videoP100),cur.videoP100,prev?.videoP100,'up','',0,`Hold rate: ${fmt(cur.videoP25?cur.videoP100/cur.videoP25*100:0,1)}%`)}
          </div>
        </div>`:''}

        <div class="kpi-section">
          <div class="kpi-section-title">💡 개선 제안 · Recommendations</div>
          <div style="font-size:12px;color:#6b7280;margin-top:4px;">데이터 기반 자동 진단 · 즉시 실행 가능한 액션</div>
          ${buildRecommendations(cur)}
        </div>

        <div class="chart-box">
          <h3 style="margin-top:0;">📈 일별 성과 추이 (선택 기간)</h3>
          <canvas id="trendChart" height="90"></canvas>
        </div>
      </div>

  `;

  drawTrend();
  bindControls();
  bindDemoTabs();
}

function bindDemoTabs(){
  document.querySelectorAll('.demo-tab').forEach(el=>{
    el.addEventListener('click',()=>{
      demoMetric=el.dataset.m;
      document.getElementById('demoBlock').innerHTML=buildDemographicsHTML();
      bindDemoTabs();
    });
  });
}

function buildHeader(){
  const c=CREATIVE;
  return `
    <div class="breadcrumb"><a href="creative_gallery.html">← 소재 갤러리</a></div>
    <h1>${c.ad_name}<span class="status-badge status-${c.effective_status}">${c.effective_status||''}</span></h1>
    <div class="subtitle">${c.campaign_name||'-'} · ${c.adset_name||'-'}</div>

    <div class="date-control">
      <div class="date-row">
        <label>기간</label>
        <select id="quickPeriod">
          <option value="7">최근 7일</option>
          <option value="14">최근 14일</option>
          <option value="30">최근 30일</option>
          <option value="custom">사용자 지정</option>
        </select>
        <span style="color:#6b7280;">|</span>
        <label>시작</label>
        <input type="date" id="periodStart" value="${periodStart}">
        <label>종료</label>
        <input type="date" id="periodEnd" value="${periodEnd}">
        <span class="period-label">현재 기간</span>
        <label class="compare-toggle" style="margin-left:auto;">
          <input type="checkbox" id="compareEnable" ${compareEnabled?'checked':''}>
          🔀 비교 기간
        </label>
        <button class="apply-btn" id="applyBtn">적용</button>
      </div>
      <div class="compare-row ${compareEnabled?'show':''}" id="compareRow">
        <label>비교 시작</label>
        <input type="date" id="compareStart" value="${compareStart}">
        <label>비교 종료</label>
        <input type="date" id="compareEnd" value="${compareEnd}">
        <span class="period-label" style="background:#fef3c7;color:#92400e;">비교 기간</span>
        <span style="font-size:11px;color:#6b7280;">기본: 선택 기간의 바로 이전 동일 길이</span>
      </div>
    </div>
  `;
}

function kpiBox(label,valHtml,curVal,prevVal,goodDir,unit,digit=0,hint=''){
  const isBad=goodDir==='up'?curVal<0.5:false;
  const cls=curVal>=1&&goodDir==='up'?'good':isBad?'bad':'';
  return `<div class="kpi-box">
    <div class="kpi-box-label">${label}</div>
    <div class="kpi-box-value ${cls}">${valHtml}</div>
    ${hint?`<div class="kpi-box-hint">${hint}</div>`:''}
    ${deltaHTML(curVal,prevVal,goodDir,unit,digit)}
  </div>`;
}

function drawTrend(){
  const rows=PERF.filter(r=>inRange(r.event_date,periodStart,periodEnd));
  if(!rows.length) return;
  const labels=rows.map(r=>r.event_date.slice(5));
  const ctx=document.getElementById('trendChart');
  if(!ctx) return;
  new Chart(ctx.getContext('2d'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'지출(₩)',data:rows.map(r=>+r.spend_krw||0),borderColor:'#dc2626',yAxisID:'y',tension:0.3},
        {label:'Meta 매출(₩)',data:rows.map(r=>+r.meta_purchase_value||0),borderColor:'#059669',yAxisID:'y',tension:0.3},
        {label:'GA 매출(₩)',data:rows.map(r=>+r.ga_revenue||0),borderColor:'#2563eb',yAxisID:'y',tension:0.3},
        {label:'CTR(%)',data:rows.map(r=>{const i=+r.impressions||0,c=+r.clicks||0;return i?c/i*100:0;}),borderColor:'#f59e0b',yAxisID:'y1',tension:0.3,borderDash:[5,3]},
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{position:'bottom'}},
      scales:{
        y:{position:'left',title:{display:true,text:'금액(₩)'}},
        y1:{position:'right',title:{display:true,text:'CTR(%)'},grid:{drawOnChartArea:false}}
      }
    }
  });
}

function bindControls(){
  const qp=document.getElementById('quickPeriod');
  const ps=document.getElementById('periodStart');
  const pe=document.getElementById('periodEnd');
  const ce=document.getElementById('compareEnable');
  const cs=document.getElementById('compareStart');
  const cend=document.getElementById('compareEnd');
  const ab=document.getElementById('applyBtn');
  const cr=document.getElementById('compareRow');

  if(qp) qp.addEventListener('change',e=>{
    if(e.target.value==='custom') return;
    const days=+e.target.value;
    const maxDate=PERF.length?PERF[PERF.length-1].event_date:new Date().toISOString().slice(0,10);
    const s=new Date(maxDate);s.setDate(s.getDate()-(days-1));
    ps.value=s.toISOString().slice(0,10);
    pe.value=maxDate;
  });

  if(ce) ce.addEventListener('change',e=>{
    compareEnabled=e.target.checked;
    cr.classList.toggle('show',compareEnabled);
  });

  if(ab) ab.addEventListener('click',()=>{
    periodStart=ps.value;
    periodEnd=pe.value;
    compareEnabled=ce.checked;
    if(compareEnabled){
      compareStart=cs.value;
      compareEnd=cend.value;
    }else{
      setCompareAuto();
    }
    render();
  });

  [ps,pe].forEach(el=>{
    if(!el) return;
    el.addEventListener('change',()=>{
      periodStart=ps.value; periodEnd=pe.value;
      setCompareAuto();
      if(cs) cs.value=compareStart;
      if(cend) cend.value=compareEnd;
    });
  });
}

load();
</script>
